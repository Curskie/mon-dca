<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Invest Pilot V6.3.0 - Pulse Horizon</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --card: #0c0c0c; --up: #22c55e; --down: #ef4444; }
        body { background: var(--bg); color: #f4f4f5; font-family: 'Inter', sans-serif; margin: 0; padding-top: env(safe-area-inset-top); overflow-x: hidden; }
        
        .glass-card { background: var(--card); border: 1px solid #1a1a1a; border-radius: 20px; padding: 18px; margin-bottom: 12px; position: relative; }
        .nav-btn { font-size: 10px; font-weight: 800; color: #444; padding: 15px 5px; text-transform: uppercase; flex: 1; text-align: center; transition: 0.3s; }
        .nav-active { color: var(--gold); }

        .page { display: none; padding: 16px; padding-bottom: 140px; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .badge-bonus { background: #1e1b4b; color: #818cf8; font-size: 7px; font-weight: 900; padding: 2px 5px; border-radius: 4px; border: 1px solid #312e81; vertical-align: middle; }
        
        .sparkline { width: 60px; height: 25px; stroke-width: 2; fill: none; stroke-linecap: round; filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); }
        
        .is-ghost { filter: blur(15px); pointer-events: none; }
        .perf-up { color: var(--up); }
        .perf-down { color: var(--down); }

        .live-tag { font-size: 7px; font-weight: 900; background: #111; color: var(--gold); padding: 3px 6px; border-radius: 5px; border: 1px solid #222; }
    </style>
</head>
<body onload="initApp()">

    <div id="lock-screen" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center p-10">
        <div class="mb-16 italic font-black text-gold text-6xl tracking-tighter">PILOT</div>
        <input type="password" id="pinInput" maxlength="4" placeholder="••••" class="bg-transparent border-b border-zinc-800 text-center text-4xl w-full outline-none text-gold font-black tracking-widest">
    </div>

    <div id="app-content" style="display:none">
        <header class="p-6 pt-14 flex justify-between items-center fixed top-0 w-full z-50 bg-black/80 backdrop-blur-xl border-b border-white/5">
            <div class="flex items-center gap-2">
                <span class="live-tag">LIVE FEED</span>
                <div class="text-[9px] font-black tracking-[3px] uppercase opacity-30">V6.3.0 Horizon</div>
            </div>
            <button onclick="toggleGhost()" class="opacity-40 hover:opacity-100 transition-opacity">👻</button>
        </header>

        <nav class="fixed bottom-0 w-full flex bg-black/95 backdrop-blur-3xl border-t border-white/5 z-50 pb-8 px-4">
            <button onclick="showPage('main', this)" class="nav-btn nav-active">DCA</button>
            <button onclick="showPage('vault', this)" class="nav-btn">VAULT</button>
            <button onclick="showPage('fire', this)" class="nav-btn">FIRE</button>
            <button onclick="showPage('stats', this)" class="nav-btn">STATS</button>
        </nav>

        <div id="main" class="page active mt-20">
            <div class="glass-card mb-4 border-gold/10">
                <span class="text-[9px] font-black text-zinc-500 uppercase tracking-widest block mb-1">Budget Mensuel</span>
                <div class="flex items-center justify-between">
                    <input type="number" id="dcaInput" value="330" oninput="calculateDCA()" class="text-5xl font-black bg-transparent text-white outline-none w-2/3 tracking-tighter">
                    <button onclick="toggleDcaView()" id="viewLabel" class="text-[8px] font-black bg-zinc-900 border border-zinc-800 px-3 py-2 rounded-lg text-gold uppercase tracking-tighter">MODE % ⇄</button>
                </div>
            </div>
            
            <div id="dca-list" class="space-y-2"></div>
        </div>

        <div id="vault" class="page mt-20 text-center">
            <div class="glass-card py-12">
                <span class="text-[10px] font-black text-zinc-500 uppercase tracking-[4px]">Net Worth</span>
                <div class="text-5xl font-black text-white mt-4 blur-target" id="total-val">12 472.38 €</div>
                <div class="mt-8 flex justify-center gap-2" id="disciplineGrid"></div>
            </div>
        </div>

        <div id="fire" class="page mt-20"></div>
        <div id="stats" class="page mt-20"></div>
    </div>

    <script>
        const PIN = "1104";
        let isGhost = false, dcaViewMode = 'amount';
        let marketData = {};

        const STRATEGY = {
            WPEA: { name: "MSCI World", base: 192, isEquity: true },
            COFA: { name: "Coface SA", base: 30, isEquity: true },
            PMEH: { name: "PEA Immobilier", base: 27, isEquity: false },
            PAEEM: { name: "Emerging Markets", base: 22, isEquity: true },
            ASAM: { name: "Defense Europe", base: 12, isEquity: true },
            ESE: { name: "S&P 500 Swap", base: 12, isEquity: true },
            Crypto: { name: "Bitcoin", base: 35, isEquity: true },
            SENS: { name: "Sensorion", base: 22.38, isEquity: true, isFixed: true, pru: 0.758 }
        };

        function generateSparkline(isUp) {
            const points = [];
            for (let i = 0; i < 6; i++) {
                points.push(Math.floor(Math.random() * 25));
            }
            if (isUp) points[5] = 2; // Finir haut
            else points[5] = 23;    // Finir bas
            
            const path = points.map((p, i) => `${i * 12},${p}`).join(' L ');
            return `<svg class="sparkline" style="stroke: ${isUp ? 'var(--up)' : 'var(--down)'}"><path d="M 0,${points[0]} L ${path}" /></svg>`;
        }

        async function fetchMarketData() {
            // Simulation temps réel
            Object.keys(STRATEGY).forEach(k => {
                marketData[k] = (Math.random() * 4 - 1.5).toFixed(2);
            });
            // Sensorion réel vs PRU
            marketData['SENS'] = (((0.795 - 0.758) / 0.758) * 100).toFixed(2);
            calculateDCA();
        }

        function initApp() {
            document.getElementById('pinInput').addEventListener('input', (e) => {
                if(e.target.value === PIN) {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('app-content').style.display = 'block';
                    fetchMarketData();
                }
            });
        }

        function toggleDcaView() {
            dcaViewMode = dcaViewMode === 'amount' ? 'perf' : 'amount';
            calculateDCA();
        }

        function calculateDCA() {
            const input = parseFloat(document.getElementById('dcaInput').value) || 0;
            const ratio = input / 330;
            
            document.getElementById('dca-list').innerHTML = Object.keys(STRATEGY).map(k => {
                const val = STRATEGY[k].isFixed ? STRATEGY[k].base : (STRATEGY[k].base * ratio);
                const perf = parseFloat(marketData[k]);
                const isPositive = perf >= 0;

                return `
                <div class="glass-card !mb-2 flex justify-between items-center py-4">
                    <div class="flex items-center gap-3">
                        ${generateSparkline(isPositive)}
                        <div>
                            <span class="text-[10px] font-black text-gold uppercase">${k}</span>
                            ${STRATEGY[k].isFixed ? '<span class="badge-bonus ml-1">BONUS</span>' : ''}
                            <p class="text-[7px] text-zinc-600 font-bold uppercase">${STRATEGY[k].name}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-lg font-black blur-target ${isGhost?'is-ghost':''}">
                            ${dcaViewMode === 'amount' ? parseFloat(val).toFixed(2)+'€' : (isPositive?'+':'')+perf+'%'}
                        </div>
                        <div class="text-[7px] font-black ${isPositive?'perf-up':'perf-down'} uppercase tracking-tighter">
                            ${isPositive ? 'Trend Bull' : 'Trend Bear'}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleGhost() { isGhost = !isGhost; calculateDCA(); }
        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            btn.classList.add('nav-active');
        }
    </script>
</body>
</html>
