<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Invest Pilot V3.6 - Full Control</title>
    
    <link rel="apple-touch-icon" href="1773669549907.png">
    <link rel="icon" type="image/png" href="1773669549907.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #3b82f6; --emerald: #10b981; }
        body { background: #020617; -webkit-tap-highlight-color: transparent; user-select: none; margin: 0; }
        
        /* Correction Swipe */
        .page { display: none; min-height: 100vh; padding: 20px; padding-bottom: 150px; }
        .active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Sidebar & Overlay */
        #sidebar { position: fixed; left: -320px; top: 0; width: 300px; height: 100%; background: #0f172a; z-index: 3000; transition: 0.4s; padding: 60px 20px; border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; }
        #sidebar.open { left: 0; box-shadow: 20px 0 60px rgba(0,0,0,0.8); }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2500; display: none; backdrop-filter: blur(4px); }
        
        .card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(15px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); padding: 18px; margin-bottom: 16px; position: relative; }
        .nav-btn { font-size: 10px; font-weight: 900; color: #475569; padding: 12px 0; border-bottom: 3px solid transparent; }
        .nav-active { color: #3b82f6; border-bottom-color: #3b82f6; }
        .ghost-mode .blur-val { filter: blur(14px); pointer-events: none; }
        
        textarea { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 12px; font-size: 11px; color: #cbd5e1; outline: none; width: 100%; }
        canvas { max-width: 100% !important; max-height: 100% !important; }
    </style>
</head>
<body class="text-slate-100 font-sans">

    <div id="overlay" onclick="toggleSidebar()"></div>
    
    <div id="sidebar">
        <h2 class="text-blue-500 font-black text-xs uppercase tracking-[0.2em] mb-6 italic">Terminal de Contrôle</h2>
        
        <div class="mb-6 p-4 bg-blue-600/10 border border-blue-500/30 rounded-2xl text-center">
            <p class="text-[9px] text-blue-400 font-bold uppercase mb-1">Discipline DCA</p>
            <p class="text-2xl font-black text-white"><span id="streak-count">0</span> Mois</p>
            <p class="text-[8px] text-slate-500 uppercase mt-1 italic">Série en cours 🔥</p>
        </div>

        <div class="space-y-6">
            <div>
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-2 flex justify-between tracking-widest">Frais Annuels <span class="text-emerald-400 font-mono" id="frais-val">0€</span></p>
                <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-emerald-500 w-1/3"></div></div>
            </div>

            <div>
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-2 tracking-widest">Journal de Conviction</p>
                <textarea id="convictionNote" rows="5" placeholder="Pourquoi investis-tu aujourd'hui ?" oninput="saveNote()"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <a href="https://traderepublic.com" target="_blank" class="p-3 bg-slate-800 rounded-xl text-center text-[9px] font-bold">TRADE REP.</a>
                <a href="https://fr.tradingview.com" target="_blank" class="p-3 bg-slate-800 rounded-xl text-center text-[9px] font-bold">TRADINGVIEW</a>
            </div>

            <div class="pt-6 border-t border-white/5 space-y-2">
                <button onclick="exportData()" class="w-full text-left p-3 rounded-xl bg-slate-900 text-[9px] font-bold uppercase border border-white/5">📤 Backup JSON</button>
                <button onclick="clearData()" class="w-full text-left p-3 rounded-xl bg-red-900/10 text-red-500 text-[9px] font-bold uppercase">⚠️ Reset Global</button>
            </div>
        </div>
    </div>

    <div id="lock-screen" class="fixed inset-0 bg-[#020617] z-[5000] flex flex-col items-center justify-center">
        <img src="1773669549907.png" class="w-20 h-20 rounded-2xl mb-12 shadow-2xl">
        <div id="pin-dots" class="flex gap-5 mb-12">
            <div class="w-3.5 h-3.5 rounded-full border-2 border-slate-700"></div>
            <div class="w-3.5 h-3.5 rounded-full border-2 border-slate-700"></div>
            <div class="w-3.5 h-3.5 rounded-full border-2 border-slate-700"></div>
            <div class="w-3.5 h-3.5 rounded-full border-2 border-slate-700"></div>
        </div>
        <input type="password" id="pinInput" maxlength="4" inputmode="numeric" autofocus class="absolute opacity-0">
    </div>

    <header class="sticky top-0 z-[1000] flex justify-between items-center px-6 pt-12 pb-4 bg-[#020617]/90 backdrop-blur-md">
        <button onclick="toggleSidebar()" class="p-2 -ml-2 text-slate-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
        </button>
        <div class="flex items-center gap-3">
            <button onclick="toggleGhost()" class="p-2 bg-slate-900 rounded-xl border border-white/5">👁️</button>
            <img src="1773669549907.png" class="w-8 h-8 rounded-lg border border-white/10 shadow-lg">
        </div>
    </header>

    <nav class="sticky top-[100px] z-[1000] flex justify-around bg-[#020617] border-b border-white/5">
        <button onclick="showPage('main', this)" class="nav-btn nav-active w-full uppercase">DCA</button>
        <button onclick="showPage('freedom', this)" class="nav-btn w-full uppercase">Liberté</button>
        <button onclick="showPage('history', this)" class="nav-btn w-full uppercase">Suivi</button>
    </nav>

    <div id="main" class="page active">
        <div class="card bg-gradient-to-br from-blue-600/10 to-transparent">
            <p class="text-[9px] font-black text-blue-500 uppercase mb-4 italic" id="current-date"></p>
            <div class="flex gap-3 mb-6 items-center">
                <input type="number" id="dcaInput" value="330" oninput="calculateDCA()" class="w-full bg-transparent text-5xl font-mono font-bold outline-none">
                <button onclick="saveToHistory()" class="bg-blue-600 px-6 py-4 rounded-2xl font-black text-[10px] active:scale-90">VALIDER</button>
            </div>
            <div id="calculation-list" class="space-y-2"></div>
        </div>
    </div>

    <div id="freedom" class="page">
        <div class="card text-center py-12">
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Rente Passive Mensuelle</p>
            <div class="text-6xl font-black mb-6 blur-val tracking-tighter" id="rente-val">0 €</div>
            <div class="h-3 bg-slate-900 rounded-full overflow-hidden w-full mb-3 border border-white/5">
                <div id="freedom-progress" class="h-full bg-gradient-to-r from-blue-600 to-emerald-400 transition-all duration-1000"></div>
            </div>
            <div class="flex justify-between text-[10px] font-black uppercase text-slate-500">
                <span>Objectif 1500€</span>
                <span class="text-emerald-400"><span id="freedom-percent">0</span>%</span>
            </div>
        </div>
    </div>

    <div id="history" class="page">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="card m-0 flex flex-col items-center justify-center h-48">
                <div class="w-full h-28 relative">
                    <canvas id="allocationChart"></canvas>
                </div>
                <p class="text-[8px] font-black text-slate-500 uppercase mt-4">Enveloppes</p>
            </div>
            <div class="card m-0 flex flex-col items-center justify-center h-48">
                <div class="w-full h-28 relative">
                    <canvas id="geoChart"></canvas>
                </div>
                <p class="text-[8px] font-black text-slate-500 uppercase mt-4">Géographie</p>
            </div>
        </div>
        <div id="history-list" class="space-y-2 blur-val mt-4"></div>
    </div>

    <script>
        const PIN_CODE = "1104";
        const baseData = { world: 192, cofa: 30, immo: 27, em: 22, def: 12, sp: 12, crypto: 35 };
        let charts = {};

        // PIN
        const pinInput = document.getElementById('pinInput');
        const dots = document.querySelectorAll('#pin-dots div');
        pinInput.addEventListener('input', (e) => {
            const val = e.target.value;
            dots.forEach((dot, i) => dot.style.background = i < val.length ? '#3b82f6' : 'transparent');
            if(val === PIN_CODE) { document.getElementById('lock-screen').style.display = 'none'; updateAll(); }
            else if(val.length === 4) e.target.value = '';
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            const overlay = document.getElementById('overlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        }

        function calculateDCA() {
            const val = parseFloat(document.getElementById('dcaInput').value) || 0;
            const container = document.getElementById('calculation-list');
            let res = {...baseData};
            if (val > 330) { const s = val - 330; res.world += s * 0.8; res.crypto += s * 0.2; }
            else { const r = val / 330; Object.keys(baseData).forEach(k => res[k] *= r); }
            container.innerHTML = Object.keys(res).map(k => `
                <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                    <span class="text-[9px] font-bold text-slate-500 uppercase">${k}</span>
                    <span class="font-mono text-lg font-bold">${res[k].toFixed(2)}€</span>
                </div>`).join('');
        }

        function updateAll() {
            const history = JSON.parse(localStorage.getItem('invest_history') || '[]');
            const total = history.reduce((sum, item) => sum + item.amount, 0);
            
            // Stats
            document.getElementById('rente-val').innerText = ((total * 0.04) / 12).toFixed(2) + " €";
            const percent = Math.min((total / 450000) * 100, 100);
            document.getElementById('freedom-progress').style.width = percent + "%";
            document.getElementById('freedom-percent').innerText = percent.toFixed(1);
            document.getElementById('streak-count').innerText = history.length;
            document.getElementById('frais-val').innerText = (total * 0.0022).toFixed(1) + "€";
            document.getElementById('convictionNote').value = localStorage.getItem('user_note') || "";

            renderCharts();

            // Historique
            document.getElementById('history-list').innerHTML = history.slice().reverse().map(item => `
                <div class="flex justify-between p-4 bg-white/5 rounded-2xl border border-white/5 mb-2">
                    <span class="text-[9px] font-black text-slate-500 uppercase tracking-tighter">${item.date}</span>
                    <span class="font-mono font-bold text-blue-400">+${item.amount.toFixed(0)}€</span>
                </div>`).join('');
        }

        function renderCharts() {
            const config = {
                allocationChart: { data: [85, 11, 4], colors: ['#3b82f6', '#f59e0b', '#10b981'] },
                geoChart: { data: [70, 20, 10], colors: ['#ef4444', '#3b82f6', '#6366f1'] }
            };
            Object.keys(config).forEach(id => {
                const ctx = document.getElementById(id);
                if(!ctx) return;
                if(charts[id]) charts[id].destroy();
                charts[id] = new Chart(ctx, {
                    type: 'doughnut',
                    data: { datasets: [{ data: config[id].data, backgroundColor: config[id].colors, borderWidth: 0 }] },
                    options: { cutout: '82%', maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
            });
        }

        function saveToHistory() {
            const val = parseFloat(document.getElementById('dcaInput').value);
            if(!val) return;
            const history = JSON.parse(localStorage.getItem('invest_history') || '[]');
            history.push({ date: new Date().toLocaleDateString('fr-FR', { month: 'short', year: '2y' }), amount: val });
            localStorage.setItem('invest_history', JSON.stringify(history));
            updateAll();
            alert("Position enregistrée !");
        }

        function saveNote() { localStorage.setItem('user_note', document.getElementById('convictionNote').value); }

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            btn.classList.add('nav-active');
            if(id === 'history') setTimeout(renderCharts, 100);
            window.scrollTo(0,0);
        }

        function toggleGhost() { document.body.classList.toggle('ghost-mode'); }
        function exportData() { navigator.clipboard.writeText(localStorage.getItem('invest_history')); alert("JSON copié !"); }
        function clearData() { if(confirm("Réinitialiser toutes les données ?")) { localStorage.clear(); location.reload(); } }

        document.getElementById('current-date').innerText = new Date().toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
        calculateDCA();
        window.onclick = () => { if(document.getElementById('lock-screen').style.display !== 'none') pinInput.focus(); }
    </script>
</body>
</html>
