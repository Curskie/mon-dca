<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Invest Pilot V4.0 - Grand Maître</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --gold: #D4AF37; --bg: #010409; --emerald: #10b981; }
        body { background: var(--bg); color: #e6edf3; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        #sidebar { position: fixed; left: -300px; top: 0; width: 280px; height: 100%; background: #05070a; z-index: 3000; transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1); padding: 60px 20px; border-right: 1px solid rgba(212,175,55,0.1); }
        #sidebar.open { left: 0; box-shadow: 20px 0 60px rgba(0,0,0,0.9); }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2500; display: none; backdrop-filter: blur(8px); }

        .glass-card { 
            background: linear-gradient(135deg, rgba(20,25,35,0.8) 0%, rgba(5,10,20,0.9) 100%);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 24px; padding: 24px; margin-bottom: 20px;
        }

        .nav-btn { font-size: 9px; font-weight: 800; color: #484f58; flex: 1; text-align: center; padding: 18px 0; border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: 1px; }
        .nav-active { color: var(--gold); border-bottom-color: var(--gold); }

        .stat-label { font-size: 10px; font-weight: 900; color: #8b949e; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 2px; }

        .page { display: none; padding: 20px; padding-bottom: 120px; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .forecast-card { border-left: 3px solid var(--gold); padding-left: 15px; margin-top: 15px; }
    </style>
</head>
<body onload="initApp()">

    <div id="overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar">
        <p class="text-[10px] font-black text-gold uppercase tracking-[4px] mb-8 text-center italic">Le Coffre (The Vault)</p>
        <textarea id="vault-input" oninput="saveVault()" class="w-full h-40 bg-white/5 border border-white/10 rounded-xl p-4 text-xs text-slate-300 outline-none mb-6" placeholder="Notes confidentielles, IBAN, Rappels..."></textarea>
        
        <div class="space-y-4">
            <div class="p-5 bg-white/5 border border-white/5 rounded-2xl text-center">
                <p class="text-[9px] text-slate-500 font-bold uppercase mb-1 italic">DCA Countdown</p>
                <p id="countdown" class="text-xl font-black text-gold">--j --h --m</p>
            </div>
            <button onclick="exportData()" class="w-full p-4 bg-white/5 rounded-xl text-[10px] font-black uppercase border border-white/5 text-slate-300 text-left">💾 Export JSON</button>
        </div>
    </div>

    <div id="lock-screen" class="fixed inset-0 bg-[#010409] z-[5000] flex flex-col items-center justify-center">
        <img src="1773669549907.png" class="w-20 h-20 rounded-3xl mb-10 border border-gold/20 p-1">
        <input type="password" id="pinInput" maxlength="4" placeholder="••••" class="bg-transparent text-center text-5xl w-40 border-b-2 border-gold pb-2 text-gold outline-none">
    </div>

    <div id="app-content" style="display:none">
        <header class="p-6 pt-12 flex justify-between items-center border-b border-white/5 bg-[#010409]/90 backdrop-blur-md sticky top-0 z-50">
            <button onclick="toggleSidebar()" class="text-gold p-2 -ml-2"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 8h16M4 16h16" stroke-linecap="round"/></svg></button>
            <span id="current-date" class="text-[11px] font-black text-gold uppercase tracking-widest"></span>
            <img src="1773669549907.png" class="w-10 h-10 rounded-xl border border-gold/30">
        </header>

        <nav class="flex border-b border-white/5 sticky top-[95px] bg-[#010409] z-50">
            <button onclick="showPage('main', this)" class="nav-btn nav-active">DCA</button>
            <button onclick="showPage('fire', this)" class="nav-btn">FIRE</button>
            <button onclick="showPage('stats', this)" class="nav-btn">STATS</button>
            <button onclick="showPage('market', this)" class="nav-btn">MARCHÉ</button>
        </nav>

        <div id="main" class="page active">
            <div class="glass-card">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-2 tracking-widest italic">Injection stratégique</p>
                <div class="flex items-end gap-4 mb-8">
                    <input type="number" id="dcaInput" value="330" oninput="calculateDCA()" class="text-6xl font-black w-full tracking-tighter bg-transparent outline-none">
                    <button onclick="saveToHistory()" class="bg-gold w-16 h-16 rounded-2xl flex items-center justify-center mb-1"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
                </div>
                <div id="calculation-list" class="space-y-3"></div>
            </div>
        </div>

        <div id="fire" class="page">
            <div class="glass-card">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest text-center">Rente & Prévisions</p>
                <div class="text-6xl font-black text-white text-center mb-4 tracking-tighter" id="rente-val">0 €</div>
                
                <div class="space-y-4 border-t border-white/5 pt-6">
                    <div class="forecast-card"><p class="text-[9px] text-gold uppercase font-black">Dans 10 ans</p><p id="f-10" class="text-xl font-black">-- €</p></div>
                    <div class="forecast-card"><p class="text-[9px] text-gold uppercase font-black">Dans 20 ans</p><p id="f-20" class="text-xl font-black">-- €</p></div>
                    <div class="forecast-card"><p class="text-[9px] text-gold uppercase font-black">Dans 30 ans (Retraite Or)</p><p id="f-30" class="text-xl font-black">-- €</p></div>
                </div>
            </div>
        </div>

        <div id="stats" class="page">
            <div class="glass-card">
                <p class="text-center text-[10px] font-black text-gold uppercase mb-6 tracking-widest italic">Analyse de Risque</p>
                <div class="p-4 bg-white/5 rounded-2xl text-center mb-6">
                    <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">Profil de Portefeuille</p>
                    <p id="risk-status" class="text-xl font-black text-emerald uppercase tracking-tighter">ÉQUILIBRÉ (V4)</p>
                </div>
                <div class="h-48 mb-8"><canvas id="allocChart"></canvas></div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="stat-label"><div class="dot bg-[#D4AF37]"></div>PEA</div>
                    <div class="stat-label"><div class="dot bg-[#10b981]"></div>CRYPTO</div>
                    <div class="stat-label"><div class="dot bg-[#f59e0b]"></div>CTO</div>
                </div>
            </div>
            
            <div class="glass-card">
                <p class="text-center text-[10px] font-black text-gold uppercase mb-6 tracking-widest italic">Exposition Géo</p>
                <div class="h-48 mb-8"><canvas id="geoChart"></canvas></div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="stat-label"><div class="dot bg-[#ef4444]"></div>USA</div>
                    <div class="stat-label"><div class="dot bg-[#D4AF37]"></div>EURO</div>
                    <div class="stat-label"><div class="dot bg-[#6366f1]"></div>EM</div>
                </div>
            </div>
        </div>

        <div id="market" class="page">
            <div class="glass-card h-[500px] p-1 overflow-hidden border-gold/20">
                <iframe src="https://s.tradingview.com/embed-widget/market-overview/?locale=fr#%7B%22colorTheme%22%3A%22dark%22%2C%22isTransparent%22%3Atrue%2C%22width%22%3A%22100%25%22%2C%22height%22%3A%22100%25%22%2C%22tabs%22%3A%5B%7B%22title%22%3A%22Indices%22%2C%22symbols%22%3A%5B%7B%22s%22%3A%22FOREXCOM%3ASPX500%22%2C%22d%22%3A%22S%26P%20500%22%7D%2C%7B%22s%22%3A%22INDEX%3ACAC40%22%2C%22d%22%3A%22CAC%2040%22%7D%2C%7B%22s%22%3A%22BINANCE%3ABTCUSDT%22%2C%22d%22%3A%22Bitcoin%22%7D%5D%7D%5D%7D" width="100%" height="100%" frameborder="0"></iframe>
            </div>
        </div>
    </div>

    <script>
        const baseData = { world: 192, cofa: 30, immo: 27, em: 22, def: 12, sp: 12, crypto: 35 };
        let charts = {};

        function initApp() {
            document.getElementById('pinInput').addEventListener('input', (e) => {
                if(e.target.value === "1104") {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('app-content').style.display = 'block';
                    document.getElementById('vault-input').value = localStorage.getItem('invest_vault') || '';
                    updateAll();
                    startCountdown();
                }
            });
            calculateDCA();
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
        }

        function toggleSidebar() {
            const side = document.getElementById('sidebar');
            const over = document.getElementById('overlay');
            side.classList.toggle('open');
            over.style.display = side.classList.contains('open') ? 'block' : 'none';
        }

        function saveVault() { localStorage.setItem('invest_vault', document.getElementById('vault-input').value); }

        function calculateDCA() {
            const val = parseFloat(document.getElementById('dcaInput').value) || 0;
            const container = document.getElementById('calculation-list');
            let res = {...baseData};
            if (val > 330) { const s = val - 330; res.world += s * 0.8; res.crypto += s * 0.2; }
            else { const r = val / 330; Object.keys(baseData).forEach(k => res[k] *= r); }
            container.innerHTML = Object.keys(res).map(k => `
                <div class="flex justify-between items-center p-4 bg-white/5 rounded-xl border border-white/5">
                    <span class="text-[10px] font-black text-gold uppercase opacity-60">${k}</span>
                    <span class="text-xl font-black text-white">${res[k].toFixed(2)}€</span>
                </div>`).join('');
        }

        function updateAll() {
            const history = JSON.parse(localStorage.getItem('invest_history') || '[]');
            const totalCapital = history.reduce((sum, item) => sum + item.amount, 0);
            const rente = (totalCapital * 0.04) / 12;
            const monthlyDCA = parseFloat(document.getElementById('dcaInput').value) || 330;
            
            document.getElementById('rente-val').innerText = rente.toFixed(2) + " €";
            
            // WEALTH FORECAST (Simulation 7% / an)
            const forecast = (years) => {
                let cap = totalCapital;
                for(let i=0; i < years*12; i++) { cap = (cap + monthlyDCA) * (1 + 0.07/12); }
                return cap.toLocaleString('fr-FR', {style: 'currency', currency: 'EUR', maximumFractionDigits: 0});
            };
            document.getElementById('f-10').innerText = forecast(10);
            document.getElementById('f-20').innerText = forecast(20);
            document.getElementById('f-30').innerText = forecast(30);

            renderCharts();
        }

        function renderCharts() {
            const cfgs = [
                { id: 'allocChart', data: [85, 11, 4], colors: ['#D4AF37', '#10b981', '#f59e0b'] },
                { id: 'geoChart', data: [70, 20, 10], colors: ['#ef4444', '#D4AF37', '#6366f1'] }
            ];
            cfgs.forEach(cfg => {
                const ctx = document.getElementById(cfg.id);
                if(charts[cfg.id]) charts[cfg.id].destroy();
                charts[cfg.id] = new Chart(ctx, {
                    type: 'doughnut',
                    data: { datasets: [{ data: cfg.data, backgroundColor: cfg.colors, borderWidth: 0 }] },
                    options: { cutout: '85%', maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
            });
        }

        function startCountdown() {
            const update = () => {
                const now = new Date();
                const next = new Date(now.getFullYear(), now.getMonth() + 1, 1);
                const diff = next - now;
                const d = Math.floor(diff / (1000*60*60*24));
                const h = Math.floor((diff / (1000*60*60)) % 24);
                const m = Math.floor((diff / 1000 / 60) % 60);
                document.getElementById('countdown').innerText = `${d}j ${h}h ${m}m`;
            };
            update(); setInterval(update, 60000);
        }

        function saveToHistory() {
            const val = parseFloat(document.getElementById('dcaInput').value);
            if(!val) return;
            const history = JSON.parse(localStorage.getItem('invest_history') || '[]');
            history.push({ date: new Date().toLocaleDateString('fr-FR', { month: 'short' }), amount: val });
            localStorage.setItem('invest_history', JSON.stringify(history));
            updateAll();
            alert("Capital mis à jour.");
        }

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            btn.classList.add('nav-active');
            if(id === 'stats' || id === 'fire') setTimeout(updateAll, 100);
        }

        function exportData() { navigator.clipboard.writeText(localStorage.getItem('invest_history')); alert("Data copiée."); }
    </script>
</body>
</html>
