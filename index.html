<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Invest Pilot V6.5.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --card: #0c0c0c; --up: #22c55e; --down: #ef4444; }
        body { background: var(--bg); color: #f4f4f5; font-family: 'Inter', sans-serif; margin: 0; padding-top: env(safe-area-inset-top); overflow-x: hidden; }
        .glass-card { background: var(--card); border: 1px solid #1a1a1a; border-radius: 24px; padding: 22px; margin-bottom: 16px; position: relative; }
        .nav-btn { font-size: 10px; font-weight: 800; color: #444; padding: 15px 5px; text-transform: uppercase; flex: 1; text-align: center; }
        .nav-active { color: var(--gold); }
        .page { display: none; padding: 16px; padding-bottom: 140px; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .is-ghost { filter: blur(15px) !important; pointer-events: none; }
        .sparkline { width: 50px; height: 20px; stroke-width: 2; fill: none; }
        .badge-bonus { background: #1e1b4b; color: #818cf8; font-size: 7px; font-weight: 900; padding: 2px 6px; border-radius: 4px; border: 1px solid #312e81; }
    </style>
</head>
<body onload="initApp()">

    <div id="lock-screen" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center p-10">
        <div class="mb-16 italic font-black text-gold text-6xl tracking-tighter uppercase">Pilot</div>
        <input type="password" id="pinInput" maxlength="4" placeholder="••••" class="bg-transparent border-b border-zinc-800 text-center text-4xl w-full outline-none text-gold font-black tracking-[10px]">
    </div>

    <div id="app-content" style="display:none">
        <header class="p-6 pt-14 flex justify-between items-center fixed top-0 w-full z-50 bg-black/80 backdrop-blur-xl border-b border-white/5">
            <div class="text-[9px] font-black tracking-[3px] uppercase opacity-30 text-gold font-bold">V6.5.0 Master</div>
            <div class="flex gap-4">
                <button onclick="resetApp()" class="w-10 h-10 rounded-full bg-zinc-900 flex items-center justify-center text-lg">↻</button>
                <button onclick="toggleGhost()" class="w-10 h-10 rounded-full bg-zinc-900 flex items-center justify-center text-lg">👻</button>
            </div>
        </header>

        <nav class="fixed bottom-0 w-full flex bg-black/95 backdrop-blur-3xl border-t border-white/5 z-50 pb-8 px-4">
            <button onclick="showPage('main', this)" class="nav-btn nav-active">DCA</button>
            <button onclick="showPage('vault', this)" class="nav-btn">Vault</button>
            <button onclick="showPage('fire', this)" class="nav-btn">Fire</button>
            <button onclick="showPage('stats', this)" class="nav-btn">Stats</button>
        </nav>

        <div id="main" class="page active mt-20">
            <div class="glass-card flex items-center gap-4 border-gold/10">
                <div class="flex-grow">
                    <span class="text-[9px] font-black text-zinc-500 uppercase tracking-widest block mb-1">Injection DCA</span>
                    <input type="number" id="dcaInput" value="330" oninput="calculateAll()" class="text-5xl font-black bg-transparent text-white outline-none w-full tracking-tighter">
                </div>
                <button onclick="confirmDCA(this)" class="bg-gold text-black w-12 h-12 rounded-xl flex items-center justify-center text-xl font-bold active:scale-90">✓</button>
            </div>
            <div class="flex justify-end mb-4">
                <button onclick="toggleDcaView()" id="viewLabel" class="text-[8px] font-black bg-zinc-950 border border-zinc-900 px-3 py-2 rounded-lg text-gold uppercase">Mode % ⇄</button>
            </div>
            <div id="dca-list" class="space-y-2"></div>
        </div>

        <div id="vault" class="page mt-20">
            <div class="glass-card text-center py-20 relative">
                <button onclick="editCapital()" class="absolute top-4 right-4 text-zinc-700 hover:text-gold text-lg">⚙️</button>
                <span class="text-[10px] font-black text-zinc-500 uppercase tracking-[6px]">Capital Total</span>
                <div class="text-5xl font-black text-white mt-4 blur-target" id="total-val">-- €</div>
            </div>
            <div class="glass-card">
                <span class="text-[9px] font-black text-zinc-500 uppercase block mb-3 tracking-widest text-center">Objectif 50k</span>
                <div class="h-1 bg-zinc-900 rounded-full overflow-hidden">
                    <div class="h-full bg-gold transition-all duration-1000" id="success-bar" style="width:0%"></div>
                </div>
                <div class="mt-4 text-center font-black text-white text-xl blur-target" id="success-pct">0%</div>
            </div>
        </div>

        <div id="fire" class="page mt-20">
            <div class="glass-card text-center py-10" onclick="toggleFireView()">
                <div class="text-6xl font-black text-white blur-target" id="fire-val">0 €</div>
                <p id="fire-label" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mt-2 mb-8 italic">Rente Mensuelle (Toucher pour changer)</p>
                <div class="bg-zinc-950 p-4 rounded-2xl border border-zinc-900 inline-block px-8">
                    <span class="text-[11px] font-black text-gold uppercase tracking-tighter" id="virement-countdown">-- virements vers 50k</span>
                </div>
                <div id="forecast-list" class="mt-8 space-y-4 text-left border-t border-zinc-900 pt-6"></div>
            </div>
        </div>

        <div id="stats" class="page mt-20">
            <div class="space-y-4">
                <div class="glass-card">
                    <span class="text-[10px] font-black text-gold uppercase tracking-[2px] block mb-4">Allocation Actifs</span>
                    <div class="flex justify-between items-end"><div class="text-4xl font-black text-white blur-target" id="equityDisplay">0%</div><span class="text-[9px] font-black text-zinc-500 uppercase">Equity / Risque</span></div>
                </div>
                <div class="glass-card">
                    <span class="text-[10px] font-black text-gold uppercase tracking-[2px] block mb-4">Géographie</span>
                    <div class="space-y-2 text-[10px] font-bold uppercase tracking-tighter">
                        <div class="flex justify-between"><span>USA (S&P/World)</span><span class="text-white">65%</span></div>
                        <div class="flex justify-between"><span>Europe (Coface/Def)</span><span class="text-white">25%</span></div>
                        <div class="flex justify-between"><span>Emerging Markets</span><span class="text-white">10%</span></div>
                    </div>
                </div>
                <div class="glass-card">
                    <span class="text-[10px] font-black text-gold uppercase tracking-[2px] block mb-4">Enveloppes</span>
                    <div class="flex justify-between text-[11px] font-black italic">
                        <div class="text-zinc-500">PEA <span class="text-white ml-2">89%</span></div>
                        <div class="text-zinc-500">CRYPTO <span class="text-white ml-2">11%</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PIN = "1104";
        let isGhost = false, dcaViewMode = 'amount', fireViewMode = 'rente';
        let capitalBase = 12472.38;
        let marketData = {};

        const STRATEGY = {
            WPEA: { name: "MSCI World", base: 192, isEquity: true },
            COFA: { name: "Coface SA", base: 30, isEquity: true },
            PMEH: { name: "PEA Immobilier", base: 27, isEquity: false },
            PAEEM: { name: "Emerging Markets", base: 22, isEquity: true },
            ASAM: { name: "Defense Europe", base: 12, isEquity: true },
            ESE: { name: "S&P 500 Swap", base: 12, isEquity: true },
            Crypto: { name: "Bitcoin", base: 35, isEquity: true },
            SENS: { name: "Sensorion", base: 22.38, isEquity: true, isFixed: true }
        };

        function initApp() {
            document.getElementById('pinInput').addEventListener('input', (e) => {
                if(e.target.value === PIN) {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('app-content').style.display = 'block';
                    fetchMarketData();
                }
            });
        }

        function resetApp() {
            if(confirm("Réinitialiser les vues et le budget ?")) {
                document.getElementById('dcaInput').value = 330;
                dcaViewMode = 'amount';
                fireViewMode = 'rente';
                calculateAll();
            }
        }

        function editCapital() {
            const newVal = prompt("Nouveau capital (€):", capitalBase);
            if (newVal) { capitalBase = parseFloat(newVal); calculateAll(); }
        }

        function toggleFireView() {
            fireViewMode = fireViewMode === 'rente' ? 'growth' : 'rente';
            calculateAll();
        }

        function confirmDCA(btn) {
            const val = parseFloat(document.getElementById('dcaInput').value) || 0;
            capitalBase += val;
            btn.classList.add('bg-white');
            setTimeout(() => { btn.classList.remove('bg-white'); calculateAll(); }, 200);
        }

        function fetchMarketData() {
            Object.keys(STRATEGY).forEach(k => { marketData[k] = (Math.random() * 3 - 1).toFixed(2); });
            calculateAll();
        }

        function calculateAll() {
            const input = parseFloat(document.getElementById('dcaInput').value) || 0;
            const ratio = input / 330;
            let totalEq = 0, totalDca = 0;

            document.getElementById('dca-list').innerHTML = Object.keys(STRATEGY).map(k => {
                const val = STRATEGY[k].isFixed ? STRATEGY[k].base : (STRATEGY[k].base * ratio);
                totalDca += parseFloat(val);
                if(STRATEGY[k].isEquity) totalEq += parseFloat(val);
                const isPos = parseFloat(marketData[k]) >= 0;

                return `
                <div class="glass-card !mb-2 flex justify-between items-center py-4">
                    <div class="flex items-center gap-3">
                        <svg class="sparkline" style="stroke: ${isPos ? 'var(--up)' : 'var(--down)'}"><path d="M 0,15 L 10,10 L 20,18 L 30,5 L 40,12 L 50,2" /></svg>
                        <div><span class="text-[10px] font-black text-gold uppercase">${k}</span>${STRATEGY[k].isFixed?'<span class="badge-bonus ml-1">BONUS</span>':''}<p class="text-[7px] text-zinc-600 font-bold uppercase">${STRATEGY[k].name}</p></div>
                    </div>
                    <div class="text-right text-lg font-black blur-target ${isGhost?'is-ghost':''}">
                        ${dcaViewMode === 'amount' ? parseFloat(val).toFixed(2)+'€' : (isPos?'+':'')+marketData[k]+'%'}
                    </div>
                </div>`;
            }).join('');

            updateStats(input, totalEq, totalDca);
        }

        function updateStats(dca, eq, tot) {
            document.getElementById('total-val').innerText = capitalBase.toLocaleString('fr-FR') + " €";
            const prog = Math.min((capitalBase / 50000) * 100, 100);
            document.getElementById('success-bar').style.width = prog + "%";
            document.getElementById('success-pct').innerText = Math.round(prog) + "%";
            document.getElementById('equityDisplay').innerText = Math.round((eq/tot)*100) + "%";

            // Fire View
            const r = 0.0707;
            if(fireViewMode === 'rente') {
                document.getElementById('fire-val').innerText = Math.round(capitalBase * 0.04 / 12) + " €";
                document.getElementById('fire-label').innerText = "Rente Mensuelle (4%)";
            } else {
                document.getElementById('fire-val').innerText = Math.round(capitalBase * r / 12) + " €";
                document.getElementById('fire-label').innerText = "Croissance Mensuelle (7.07%)";
            }

            const ml = Math.round(Math.log((50000 * r/12 + dca) / (capitalBase * r/12 + dca)) / Math.log(1 + r/12));
            document.getElementById('virement-countdown').innerText = (ml > 0 ? ml : 0) + " virements vers 50k";

            document.getElementById('forecast-list').innerHTML = [5, 10, 20].map(a => {
                const t = capitalBase * Math.pow(1+r/12, a*12) + (dca * (Math.pow(1+r/12, a*12) - 1) / (r/12));
                return `<div class="flex justify-between py-3 border-b border-zinc-900"><span class="text-[9px] font-black text-zinc-500 uppercase">${a} ANS</span><span class="font-black blur-target ${isGhost?'is-ghost':''}">${(t/1000).toFixed(1)}k €</span></div>`;
            }).join('');
        }

        function toggleGhost() { isGhost = !isGhost; document.querySelectorAll('.blur-target').forEach(e => e.classList.toggle('is-ghost', isGhost)); }
        function toggleDcaView() { dcaViewMode = dcaViewMode === 'amount' ? 'perf' : 'amount'; calculateAll(); }
        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            btn.classList.add('nav-active');
        }
    </script>
</body>
</html>
