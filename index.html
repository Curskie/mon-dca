<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Invest Pilot V7.0 - Aero Horizon</title>
    
    <link rel="apple-touch-icon" href="icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --card: #0c0c0c; --up: #22c55e; --down: #ef4444; }
        body { background: var(--bg); color: #f4f4f5; font-family: 'Inter', sans-serif; margin: 0; padding-top: env(safe-area-inset-top); overflow-x: hidden; }
        
        /* LOGO AERO HORIZON */
        .aero-logo {
            width: 90px; height: 90px;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            position: relative; margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
        }
        .aero-needle {
            width: 4px; height: 40px;
            background: linear-gradient(to top, transparent, var(--gold));
            border-radius: 2px;
            transform: rotate(45deg);
            filter: drop-shadow(0 0 5px var(--gold));
        }

        .glass-card { background: var(--card); border: 1px solid #1a1a1a; border-radius: 24px; padding: 22px; margin-bottom: 16px; position: relative; }
        .nav-btn { font-size: 10px; font-weight: 800; color: #444; padding: 15px 5px; text-transform: uppercase; flex: 1; text-align: center; }
        .nav-active { color: var(--gold); }

        .page { display: none; padding: 16px; padding-bottom: 140px; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .is-ghost { filter: blur(15px) !important; pointer-events: none; }
        
        .progress-bar { background: #111; height: 8px; border-radius: 99px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--gold); transition: width 1s ease-in-out; }
    </style>
</head>
<body onload="initApp()">

    <div id="lock-screen" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center p-10">
        <div class="aero-logo"><div class="aero-needle"></div></div>
        <h1 class="text-white font-black tracking-[4px] uppercase text-xl mb-10">Invest Pilot</h1>
        <input type="password" id="pinInput" maxlength="4" placeholder="••••" class="bg-transparent border-b border-zinc-800 text-center text-4xl w-full outline-none text-white font-black tracking-[10px] mb-4">
        <p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest">Code Requis</p>
    </div>

    <div id="app-content" style="display:none">
        <header class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-xl border-b border-white/5 flex justify-between items-center px-6 h-[70px]">
            <div class="text-[9px] font-black tracking-[3px] uppercase opacity-40">Aero Horizon V7.0</div>
            <div class="flex gap-3">
                <button onclick="resetApp()" class="w-9 h-9 rounded-full bg-zinc-900 flex items-center justify-center text-sm">↻</button>
                <button onclick="toggleGhost()" class="w-9 h-9 rounded-full bg-zinc-900 flex items-center justify-center text-sm">👻</button>
            </div>
        </header>

        <nav class="fixed bottom-0 w-full flex bg-black/95 border-t border-white/5 z-50 pb-8 px-4">
            <button onclick="showPage('main', this)" class="nav-btn nav-active">DCA</button>
            <button onclick="showPage('vault', this)" class="nav-btn">Vault</button>
            <button onclick="showPage('fire', this)" class="nav-btn">Fire</button>
            <button onclick="showPage('stats', this)" class="nav-btn">Stats</button>
        </nav>

        <div id="main" class="page active mt-20">
            <div class="glass-card">
                <span class="text-[9px] font-black text-zinc-500 uppercase block mb-1">Injection DCA</span>
                <div class="flex items-center gap-4">
                    <input type="number" id="dcaInput" value="330" oninput="calculateAll()" class="text-5xl font-black bg-transparent text-white outline-none w-full tracking-tighter">
                    <button onclick="confirmDCA()" class="bg-gold text-black px-4 py-2 rounded-xl font-bold active:scale-95">✓</button>
                </div>
            </div>
            <div id="dca-list" class="space-y-2 mt-4"></div>
        </div>

        <div id="vault" class="page mt-20">
            <div class="glass-card text-center py-10">
                <span class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Net Worth</span>
                <div class="text-4xl font-black text-white mt-2 blur-target" id="total-val">-- €</div>
            </div>
            <div class="glass-card">
                <div class="flex justify-between mb-2">
                    <span class="text-[9px] font-black uppercase">Objectif 50k</span>
                    <span class="text-gold font-bold blur-target" id="success-pct">0%</span>
                </div>
                <div class="progress-bar"><div id="success-bar" class="progress-fill" style="width: 0%"></div></div>
            </div>
        </div>

        <div id="fire" class="page mt-20">
            <div class="glass-card text-center py-10">
                <div class="text-5xl font-black text-white blur-target" id="fire-val">0 €</div>
                <p class="text-[9px] text-zinc-500 font-bold uppercase mt-2">Rente Mensuelle (4%)</p>
                <div class="mt-8 p-4 bg-zinc-900 rounded-2xl inline-block text-[11px] font-black text-gold uppercase" id="virement-countdown">-- virements vers 50k</div>
            </div>
        </div>

        <div id="stats" class="page mt-20">
            <div class="glass-card">
                <span class="text-[10px] font-black text-gold uppercase block mb-4">Risque Equity</span>
                <div class="flex justify-between items-end">
                    <div class="text-4xl font-black text-white blur-target" id="equityDisplay">92%</div>
                    <span class="text-[9px] font-black text-zinc-500 uppercase">Exposition</span>
                </div>
            </div>
            <div class="glass-card">
                <span class="text-[10px] font-black text-gold uppercase block mb-4">Enveloppes</span>
                <div class="flex justify-between text-[11px] font-black uppercase">
                    <div>PEA <span class="text-white ml-2">89%</span></div>
                    <div>Crypto <span class="text-white ml-2">11%</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PIN = "1104";
        let isGhost = false;
        let capitalBase = 12472.38;

        const STRATEGY = {
            WPEA: { name: "MSCI World", base: 192, isEq: true },
            COFA: { name: "Coface SA", base: 30, isEq: true },
            PMEH: { name: "PEA Immobilier", base: 27, isEq: false },
            PAEEM: { name: "Emerging Markets", base: 22, isEq: true },
            ASAM: { name: "Defense Europe", base: 12, isEq: true },
            ESE: { name: "S&P 500 Swap", base: 12, isEq: true },
            BTC: { name: "Bitcoin", base: 35, isEq: true }
        };

        function initApp() {
            document.getElementById('pinInput').addEventListener('input', (e) => {
                if(e.target.value === PIN) {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('app-content').style.display = 'block';
                    calculateAll();
                }
            });
        }

        function calculateAll() {
            const input = parseFloat(document.getElementById('dcaInput').value) || 0;
            const ratio = input / 330;
            
            document.getElementById('dca-list').innerHTML = Object.keys(STRATEGY).map(k => {
                const val = (STRATEGY[k].base * ratio).toFixed(2);
                return `<div class="glass-card !py-4 flex justify-between items-center">
                    <div><span class="text-xs font-black text-gold">${k}</span><p class="text-[8px] text-zinc-600 font-bold uppercase">${STRATEGY[k].name}</p></div>
                    <div class="text-lg font-black blur-target ${isGhost?'is-ghost':''}">${val}€</div>
                </div>`;
            }).join('');

            const pct = Math.min((capitalBase / 50000) * 100, 100);
            document.getElementById('total-val').innerText = capitalBase.toLocaleString('fr-FR') + " €";
            document.getElementById('success-pct').innerText = Math.round(pct) + "%";
            document.getElementById('success-bar').style.width = pct + "%";
            document.getElementById('fire-val').innerText = Math.round(capitalBase * 0.04 / 12) + " €";
            
            const ml = Math.round((50000 - capitalBase) / (input || 1));
            document.getElementById('virement-countdown').innerText = (ml > 0 ? ml : 0) + " virements vers 50k";
        }

        function toggleGhost() { isGhost = !isGhost; document.querySelectorAll('.blur-target').forEach(e => e.classList.toggle('is-ghost', isGhost)); }
        function confirmDCA() { capitalBase += parseFloat(document.getElementById('dcaInput').value); calculateAll(); }
        function resetApp() { document.getElementById('dcaInput').value = 330; calculateAll(); }
        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            btn.classList.add('nav-active');
        }
    </script>
</body>
</html>
