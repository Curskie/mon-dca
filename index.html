<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INVEST PILOT V9.4 - BRUTE FORCE EDITION</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* --- VARIABLES DE COULEURS OFFICIELLES --- */
        :root {
            --gold: #D4AF37;
            --gold-light: #F9E076;
            --bg-black: #030303;
            --card-gray: rgba(26, 26, 30, 0.98);
            --border-white: rgba(255, 255, 255, 0.08);
            --text-main: #f4f4f5;
            --text-dim: #71717a;
        }

        /* --- RESET & FOND QUANTIQUE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            padding-top: env(safe-area-inset-top);
        }

        .bg-quantum {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% -20%, #222 0%, #030303 100%);
            z-index: -1;
        }

        /* --- SYSTEME DE CARTES V8.0 --- */
        .glass-card {
            background: var(--card-gray);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: 1px solid var(--border-white);
            border-radius: 30px;
            padding: 26px;
            margin-bottom: 18px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        /* --- NAVIGATION BASSE --- */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.96);
            border-top: 1px solid var(--border-white);
            display: flex;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            flex: 1;
            padding: 24px 0;
            text-align: center;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            color: #444;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
        }

        .nav-item.active {
            color: var(--gold);
            text-shadow: 0 0 20px rgba(212,175,55,0.7);
        }

        /* --- ANIMATIONS DE PAGES --- */
        .page-content {
            display: none;
            padding: 20px;
            height: 100vh;
            overflow-y: auto;
            padding-bottom: 180px;
        }

        .page-content.active {
            display: block;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- EFFETS SPECIAUX --- */
        #flash-layer {
            position: fixed;
            inset: 0;
            background: var(--gold);
            opacity: 0;
            z-index: 9999;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        #gold-particles {
            position: fixed;
            inset: 0;
            z-index: 9998;
            pointer-events: none;
        }

        .ghost-blur {
            filter: blur(28px) !important;
            opacity: 0.01 !important;
            transition: all 0.4s ease;
        }

        /* --- BOUTON INJECTION --- */
        .btn-inject {
            background: linear-gradient(135deg, var(--gold), #f3d060);
            color: black;
            font-weight: 900;
            padding: 14px 28px;
            border-radius: 18px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(212,175,55,0.25);
        }

        .btn-inject:active {
            transform: scale(0.96);
        }
    </style>
</head>

<body onload="bootApp()">

    <div class="bg-quantum"></div>
    <div id="flash-layer"></div>
    <canvas id="gold-particles"></canvas>

    <div id="gate-keeper" class="fixed inset-0 bg-black z-[10000] flex flex-col items-center justify-center p-10">
        <div class="mb-12">
            <div class="w-24 h-24 bg-zinc-900 rounded-[35px] border border-gold/20 flex items-center justify-center shadow-2xl">
                <div class="w-2 h-12 bg-gold rotate-45 rounded-full shadow-[0_0_15px_rgba(212,175,55,0.8)]"></div>
            </div>
        </div>
        <input type="password" id="pinField" maxlength="4" placeholder="••••" 
               class="bg-transparent text-center text-7xl w-full outline-none text-white font-black tracking-[30px] placeholder:text-zinc-900">
        <p class="text-zinc-600 font-black text-[10px] uppercase mt-10 tracking-[5px]">Encrypted Session</p>
    </div>

    <div id="main-interface" style="display:none">
        
        <header class="fixed top-0 w-full z-[90] h-[90px] bg-black/80 backdrop-blur-3xl border-b border-white/5 flex justify-between items-center px-8">
            <div class="flex flex-col">
                <span class="text-gold font-black text-sm tracking-widest uppercase">Invest Pilot</span>
                <span class="text-zinc-500 font-bold text-[8px] uppercase tracking-tighter">V9.4 Omni-Overdrive Full-Code</span>
            </div>
            <div class="flex items-center gap-5">
                <div class="hidden sm:flex items-center gap-2 bg-zinc-900/50 px-3 py-1.5 rounded-full border border-white/5">
                    <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-[7px] font-black text-zinc-400 uppercase">Trade Republic Sync</span>
                </div>
                <button onclick="togglePrivacy()" class="text-2xl hover:scale-110 transition-transform">👻</button>
            </div>
        </header>

        <nav>
            <div onclick="switchPage('dca-page', this)" class="nav-item active">DCA</div>
            <div onclick="switchPage('vault-page', this)" class="nav-item">Vault</div>
            <div onclick="switchPage('fire-page', this)" class="nav-item">Fire</div>
            <div onclick="switchPage('stats-page', this)" class="nav-item">Stats</div>
        </nav>

        <div id="dca-page" class="page-content active pt-[110px]">
            <div class="glass-card">
                <div class="flex justify-between items-center mb-8">
                    <span class="text-zinc-500 font-black text-[11px] uppercase tracking-widest">Calculateur DCA Mensuel</span>
                    <button onclick="executeDCA()" class="btn-inject">Injecter</button>
                </div>
                <div class="grid grid-cols-2 gap-8">
                    <div>
                        <span class="text-gold font-black text-[10px] uppercase block mb-2">Montant (€)</span>
                        <input type="number" id="inputAmount" value="300" oninput="refreshCalculations()" 
                               class="bg-transparent text-white text-5xl font-black outline-none w-full">
                    </div>
                    <div class="text-right">
                        <span class="text-zinc-500 font-black text-[10px] uppercase block mb-2">Sensorion (69 p.)</span>
                        <div class="text-3xl font-black text-zinc-400"><span id="sens-val">0.00</span>€</div>
                    </div>
                </div>
            </div>

            <div id="investment-grid" class="space-y-4">
                </div>
        </div>

        <div id="vault-page" class="page-content pt-[110px]">
            <div class="glass-card text-center py-24 relative overflow-hidden">
                <button onclick="adjustCapital()" class="absolute top-8 right-8 text-zinc-800 text-3xl">⚙️</button>
                <span class="text-zinc-500 font-black text-[12px] uppercase tracking-[10px] mb-6 block">Net Worth Global</span>
                <div id="net-worth-display" class="text-7xl font-black text-white tracking-tighter blur-target">325,12 €</div>
            </div>

            <div class="glass-card">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <span class="text-zinc-500 font-black text-[10px] uppercase tracking-widest block mb-1">Progression</span>
                        <span class="text-white font-black text-2xl uppercase">Objectif 50k</span>
                    </div>
                    <div id="pct-display" class="text-5xl font-black text-gold">0%</div>
                </div>
                <div class="h-4 bg-white/5 rounded-full p-1 border border-white/5">
                    <div id="progress-bar-fill" class="h-full bg-gradient-to-r from-gold via-yellow-400 to-white rounded-full transition-all duration-1000"></div>
                </div>
            </div>
        </div>

        <div id="fire-page" class="page-content pt-[110px]">
            <div class="glass-card text-center py-20 bg-gradient-to-b from-zinc-900/40 to-transparent">
                <div id="fire-amount" class="text-8xl font-black text-white tracking-tighter blur-target">0 €</div>
                <p id="fire-desc" class="text-zinc-500 font-black text-[11px] uppercase mt-8 tracking-[5px]">Rente Immédiate (4%)</p>
            </div>
            
            <div class="grid grid-cols-3 gap-4">
                <button id="fire-5" onclick="setFireTime(5)" class="py-8 bg-zinc-900 rounded-[25px] border border-white/5 font-black text-[11px] uppercase">5 ans</button>
                <button id="fire-10" onclick="setFireTime(10)" class="py-8 bg-zinc-900 rounded-[25px] border border-white/5 font-black text-[11px] uppercase">10 ans</button>
                <button id="fire-20" onclick="setFireTime(20)" class="py-8 bg-zinc-900 rounded-[25px] border border-white/5 font-black text-[11px] uppercase">20 ans</button>
            </div>
        </div>

        <div id="stats-page" class="page-content pt-[110px]">
            <div class="glass-card">
                <span class="text-gold font-black text-[12px] uppercase tracking-[4px] mb-8 block">Succès Débloqués</span>
                <div id="badge-container" class="space-y-4">
                    </div>
            </div>

            <div class="glass-card">
                <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-4">
                    <span class="text-zinc-500 font-black text-[12px] uppercase tracking-[4px]">Journal d'Injection</span>
                    <button onclick="clearLogs()" class="text-[8px] font-black text-zinc-700 uppercase">Reset Logs</button>
                </div>
                <div id="log-list" class="space-y-4">
                    </div>
            </div>
        </div>

    </div>

    <script>
        // --- DATA STRUCTURE ---
        const PIN_CODE = "1104";
        let state = {
            capital: 325.12,
            isGhostMode: false,
            projectionYears: 0,
            sensorionPrice: 0.68,
            history: []
        };

        // STRATÉGIE OFFICIELLE (MISE À JOUR MARS 2026)
        const STRATEGY_TABLE = [
            { id: 'WPEA', label: 'Pea Monde MSCI World', base: 192, isPriority: true },
            { id: 'BTC', label: 'Bitcoin (Crypto)', base: 35, isPriority: true },
            { id: 'DEF', label: 'Bloomberg Defense', base: 12, isPriority: false },
            { id: 'COFA', label: 'Coface SA', base: 30, isPriority: false },
            { id: 'PAEEM', label: 'Pea MSCI Emerging', base: 22, isPriority: false },
            { id: 'PMEH', label: 'Pea Immobilier Europe', base: 27, isPriority: false },
            { id: 'S500', label: 'S&P 500 Swap PEA', base: 12, isPriority: false }
        ];

        const TARGET_LEVELS = [
            { id: 1, label: "Explorer", threshold: 100, icon: "🛡️" },
            { id: 2, label: "Bronze", threshold: 1000, icon: "🥉" },
            { id: 3, label: "Silver", threshold: 10000, icon: "🥈" },
            { id: 4, label: "Gold", threshold: 25000, icon: "🥇" },
            { id: 5, label: "Platinum", threshold: 50000, icon: "👑" }
        ];

        // --- MOTEUR DE PARTICULES (GOLD RUSH ENGINE) ---
        const canvas = document.getElementById('gold-particles');
        const ctx = canvas.getContext('2d');
        let particlePool = [];

        function triggerGoldFlash() {
            // 1. Flash de l'écran
            const flash = document.getElementById('flash-layer');
            flash.style.opacity = "0.8";
            setTimeout(() => { flash.style.opacity = "0"; }, 250);

            // 2. Initialisation des particules
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            for(let i=0; i<120; i++) {
                particlePool.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2.2,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 20 - 5,
                    size: Math.random() * 6 + 2,
                    life: 1.0,
                    color: `hsl(${42 + Math.random() * 10}, 80%, ${50 + Math.random() * 20}%)`
                });
            }
            animateParticles();
        }

        function animateParticles() {
            if (particlePool.length === 0) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particlePool.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.25; // Gravité
                p.life -= 0.008;

                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                if (p.life <= 0) particlePool.splice(index, 1);
            });

            requestAnimationFrame(animateParticles);
        }

        // --- CALCULS CORE ---
        function refreshCalculations() {
            const inputAmount = parseFloat(document.getElementById('inputAmount').value) || 0;
            const strategySum = STRATEGY_TABLE.reduce((sum, item) => sum + item.base, 0);
            const surplus = Math.max(0, inputAmount - strategySum);

            // 1. Sensorion
            document.getElementById('sens-val').innerText = (69 * state.sensorionPrice).toFixed(2);

            // 2. Liste DCA
            const grid = document.getElementById('investment-grid');
            grid.innerHTML = ''; // Nettoyage

            STRATEGY_TABLE.forEach(item => {
                let finalAmount = item.base;
                // Logique Surplus 70/30 (World / BTC)
                if (surplus > 0 && item.isPriority) {
                    finalAmount += (item.id === 'WPEA') ? surplus * 0.7 : surplus * 0.3;
                }

                const card = document.createElement('div');
                card.className = 'glass-card !py-6 flex justify-between items-center';
                card.innerHTML = `
                    <div>
                        <span class="text-gold font-black text-sm uppercase tracking-wider">${item.id}</span>
                        <p class="text-[9px] text-zinc-500 font-black uppercase mt-1">${item.label}</p>
                    </div>
                    <div class="text-3xl font-black blur-target ${state.isGhostMode ? 'ghost-blur' : ''}">
                        ${finalAmount.toFixed(2)}€
                    </div>
                `;
                grid.appendChild(card);
            });

            // 3. Vault & Progress
            document.getElementById('net-worth-display').innerText = state.capital.toLocaleString('fr-FR', {minimumFractionDigits: 2}) + " €";
            const progressPct = Math.min((state.capital / 50000) * 100, 100);
            document.getElementById('pct-display').innerText = Math.round(progressPct) + "%";
            document.getElementById('progress-bar-fill').style.width = progressPct + "%";

            // 4. FIRE (Simulation Intérêts Composés 7% + DCA)
            const monthlyRate = 0.00583; // 7% annuel / 12
            let projectedVal = state.capital;
            if (state.projectionYears > 0) {
                const months = state.projectionYears * 12;
                // Formule Intérêts composés sur Capital + Versements réguliers
                projectedVal = state.capital * Math.pow(1 + monthlyRate, months) + 
                               inputAmount * ((Math.pow(1 + monthlyRate, months) - 1) / monthlyRate);
            }
            
            const monthlyRente = (projectedVal * 0.04) / 12;
            document.getElementById('fire-amount').innerText = Math.round(monthlyRente).toLocaleString('fr-FR') + " €";
            document.getElementById('fire-desc').innerText = state.projectionYears > 0 ? 
                `Rente estimée dans ${state.projectionYears} ans (7% rdt)` : "Rente Immédiate (4% safe)";

            updateStatsDisplay();
        }

        function updateStatsDisplay() {
            // Paliers
            const container = document.getElementById('badge-container');
            container.innerHTML = '';
            TARGET_LEVELS.forEach(lv => {
                const isUnlocked = state.capital >= lv.threshold;
                const badge = document.createElement('div');
                badge.className = `flex items-center justify-between p-5 rounded-[22px] border transition-all ${isUnlocked ? 'border-gold bg-gold/5' : 'border-white/5 opacity-20'}`;
                badge.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-3xl">${lv.icon}</span>
                        <div>
                            <p class="text-[11px] font-black uppercase text-white">${lv.label}</p>
                            <p class="text-[8px] text-gold font-black uppercase tracking-widest">${lv.threshold} €</p>
                        </div>
                    </div>
                    <span class="text-[10px] font-black">${isUnlocked ? 'DEBLOQUÉ' : 'VERROUILLÉ'}</span>
                `;
                container.appendChild(badge);
            });

            // Log
            const logBox = document.getElementById('log-list');
            logBox.innerHTML = state.history.length === 0 ? '<p class="text-zinc-800 text-center py-4 font-black uppercase text-[9px]">Aucune donnée</p>' : '';
            state.history.slice().reverse().forEach(entry => {
                const item = document.createElement('div');
                item.className = 'flex justify-between items-center border-b border-white/5 py-3';
                item.innerHTML = `
                    <span class="text-zinc-500 font-bold">${entry.date}</span>
                    <span class="text-gold font-black tracking-widest">+ ${entry.amount}€</span>
                `;
                logBox.appendChild(item);
            });
        }

        // --- ACTIONS ---
        function executeDCA() {
            const amount = parseFloat(document.getElementById('inputAmount').value) || 0;
            const oldCap = state.capital;
            state.capital += amount;
            
            state.history.push({
                date: new Date().toLocaleDateString('fr-FR'),
                amount: amount
            });

            // Detection passage de palier pour Flash
            const newlyUnlocked = TARGET_LEVELS.some(lv => oldCap < lv.threshold && state.capital >= lv.threshold);
            if (newlyUnlocked) triggerGoldFlash();

            refreshCalculations();
            alert("INJECTION OVERDRIVE CONFIRMÉE.");
        }

        function switchPage(pageId, navEl) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            navEl.classList.add('active');
        }

        function setFireTime(years) {
            state.projectionYears = (state.projectionYears === years) ? 0 : years;
            document.querySelectorAll('[id^="fire-"]').forEach(b => b.classList.remove('bg-gold', 'text-black'));
            if(state.projectionYears > 0) document.getElementById('fire-' + years).classList.add('bg-gold', 'text-black');
            refreshCalculations();
        }

        function togglePrivacy() {
            state.isGhostMode = !state.isGhostMode;
            document.querySelectorAll('.blur-target').forEach(el => {
                state.isGhostMode ? el.classList.add('ghost-blur') : el.classList.remove('ghost-blur');
            });
            refreshCalculations();
        }

        function adjustCapital() {
            const val = prompt("RECTIFICATION MANUELLE DU CAPITAL :", state.capital);
            if (val !== null) {
                state.capital = parseFloat(val);
                refreshCalculations();
            }
        }

        function clearLogs() { if(confirm("Supprimer l'historique ?")) { state.history = []; refreshCalculations(); } }

        function bootApp() {
            document.getElementById('pinField').addEventListener('input', (e) => {
                if(e.target.value === PIN_CODE) {
                    document.getElementById('gate-keeper').style.display = 'none';
                    document.getElementById('main-interface').style.display = 'block';
                    refreshCalculations();
                }
            });
        }
    </script>
</body>
</html>
