<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Invest Pilot V6.9.3 - Final Signature</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --card: #0c0c0c; --up: #22c55e; --down: #ef4444; }
        body { background: var(--bg); color: #f4f4f5; font-family: 'Inter', sans-serif; margin: 0; padding-top: env(safe-area-inset-top); overflow-x: hidden; }
        
        header { padding-top: 15px; height: 70px; }

        .glass-card { background: var(--card); border: 1px solid #1a1a1a; border-radius: 24px; padding: 22px; margin-bottom: 16px; position: relative; transition: all 0.3s ease; }
        .nav-btn { font-size: 10px; font-weight: 800; color: #444; padding: 15px 5px; text-transform: uppercase; flex: 1; text-align: center; }
        .nav-active { color: var(--gold); }

        .page { display: none; padding: 16px; padding-bottom: 140px; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .is-ghost { filter: blur(15px) !important; pointer-events: none; }
        
        /* LOGO IP AVEC DÉCOUPE STYLISÉE */
        .app-logo {
            width: 90px; height: 90px;
            background: linear-gradient(145deg, #121212 0%, #000 100%);
            border: 2px solid var(--gold);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(212,175,55,0.1);
            margin-bottom: 25px;
            position: relative;
        }

        .logo-text {
            font-size: 3.2rem;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -4px;
            transform: skewX(-6deg);
            background: linear-gradient(135deg, #FFD700 0%, #D4AF37 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        /* La fameuse découpe (The Gap) */
        .logo-text::after {
            content: "";
            position: absolute;
            top: 35%; left: -10%;
            width: 120%; height: 6px;
            background: #000; /* La découpe est une ligne de la couleur du fond */
            transform: rotate(-5deg);
        }

        .sparkline { width: 50px; height: 20px; stroke-width: 2; fill: none; }
        .perf-up { color: var(--up); }
        .perf-down { color: var(--down); }
        
        .fire-btn-dynamic { background: #151515; border: 1px solid #222; transition: all 0.1s ease; user-select: none; }
        .fire-btn-dynamic:active { background: var(--gold) !important; transform: scale(0.96); }
        .fire-btn-dynamic:active span { color: black !important; }

        .progress-bar-container { background: #111; border: 1px solid #1a1a1a; height: 12px; border-radius: 99px; overflow: hidden; }
        .progress-gold-fill { 
            height: 100%;
            background: linear-gradient(90deg, #996515 0%, #D4AF37 50%, #FFD700 100%);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
            width: 0%;
        }
    </style>
</head>
<body onload="initApp()">

    <div id="lock-screen" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center p-10">
        <div class="app-logo">
            <span class="logo-text">IP</span>
        </div>
        <h1 class="text-gold font-black text-2xl tracking-[6px] uppercase mb-12">Invest Pilot</h1>
        <input type="password" id="pinInput" maxlength="4" placeholder="••••" class="bg-transparent border-b border-zinc-800 text-center text-4xl w-full outline-none text-white font-black tracking-[10px] mb-4">
        <p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest">Identification Sécurisée</p>
    </div>

    <div id="app-content" style="display:none">
        <header class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-xl border-b border-white/5 flex justify-between items-center px-6">
            <div class="text-[9px] font-black tracking-[3px] uppercase opacity-40 text-gold">Invest Pilot V6.9.3</div>
            <div class="flex gap-3">
                <button onclick="resetApp()" class="w-9 h-9 rounded-full bg-zinc-900 flex items-center justify-center text-sm">↻</button>
                <button onclick="toggleGhost()" class="w-9 h-9 rounded-full bg-zinc-900 flex items-center justify-center text-sm">👻</button>
            </div>
        </header>

        <nav class="fixed bottom-0 w-full flex bg-black/95 backdrop-blur-3xl border-t border-white/5 z-50 pb-8 px-4">
            <button onclick="showPage('main', this)" class="nav-btn nav-active">DCA</button>
            <button onclick="showPage('vault', this)" class="nav-btn">Vault</button>
            <button onclick="showPage('fire', this)" class="nav-btn">Fire</button>
            <button onclick="showPage('stats', this)" class="nav-btn">Stats</button>
        </nav>

        <div id="main" class="page active mt-16">
            <div class="glass-card border-gold/10">
                <span class="text-[9px] font-black text-zinc-500 uppercase tracking-widest block mb-1">Stratégie Mensuelle</span>
                <div class="flex items-center gap-4">
                    <input type="number" id="dcaInput" value="330" oninput="calculateAll()" class="text-5xl font-black bg-transparent text-white outline-none w-full tracking-tighter">
                    <button onclick="confirmDCA()" class="bg-gold text-black w-12 h-12 rounded-xl flex items-center justify-center text-xl font-bold active:scale-90">✓</button>
                </div>
            </div>
            <div class="flex justify-end mb-4">
                <button onclick="toggleDcaView()" id="viewLabel" class="text-[8px] font-black bg-zinc-950 border border-zinc-900 px-3 py-2 rounded-lg text-gold uppercase">Perf ⇄ Valeur</button>
            </div>
            <div id="dca-list" class="space-y-2"></div>
        </div>

        <div id="vault" class="page mt-16">
            <div class="glass-card text-center py-16 relative">
                <button onclick="editCapital()" class="absolute top-4 right-4 text-zinc-800 text-lg">⚙️</button>
                <span class="text-[10px] font-black text-zinc-500 uppercase tracking-[6px]">Net Worth</span>
                <div class="text-5xl font-black text-white mt-4 blur-target" id="total-val">-- €</div>
            </div>
            <div class="glass-card">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[9px] font-black text-zinc-400 uppercase tracking-widest">Objectif 50k</span>
                    <span class="font-black text-gold text-sm blur-target" id="success-pct">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div id="success-bar" class="progress-gold-fill"></div>
                </div>
            </div>
        </div>

        <div id="fire" class="page mt-16 text-center">
            <div class="glass-card py-10" onclick="toggleFireView()">
                <div class="text-6xl font-black text-white blur-target" id="fire-val">0 €</div>
                <p id="fire-label" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mt-2 mb-8 italic">Rente Mensuelle (4%)</p>
                <div class="fire-btn-dynamic p-4 rounded-2xl inline-block px-10">
                    <span class="text-[11px] font-black text-gold uppercase tracking-tighter" id="virement-countdown">-- virements</span>
                </div>
                <div id="forecast-list" class="mt-8 space-y-4 text-left border-t border-zinc-900 pt-6"></div>
            </div>
        </div>

        <div id="stats" class="page mt-16">
            <div class="space-y-4">
                <div class="glass-card">
                    <span class="text-[10px] font-black text-gold uppercase tracking-[2px] block mb-4">Risque Equity</span>
                    <div class="flex justify-between items-end"><div class="text-4xl font-black text-white blur-target" id="equityDisplay">0%</div><span class="text-[9px] font-black text-zinc-500 uppercase tracking-widest">Exposition</span></div>
                </div>
                <div class="glass-card">
                    <span class="text-[10px] font-black text-gold uppercase tracking-[2px] block mb-4">Enveloppes</span>
                    <div class="flex justify-between text-[11px] font-black uppercase">
                        <div>PEA <span class="text-white ml-2">89%</span></div>
                        <div>Crypto <span class="text-white ml-2">11%</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PIN = "1104";
        let isGhost = false, dcaViewMode = 'amount', fireViewMode = 'rente';
        let capitalBase = 12472.38;
        let marketData = {};

        const STRATEGY = {
            WPEA: { name: "MSCI World", base: 192, isEq: true },
            COFA: { name: "Coface SA", base: 30, isEq: true },
            PMEH: { name: "PEA Immobilier", base: 27, isEq: false },
            PAEEM: { name: "Emerging Markets", base: 22, isEq: true },
            ASAM: { name: "Defense Europe", base: 12, isEq: true },
            ESE: { name: "S&P 500 Swap", base: 12, isEq: true },
            Crypto: { name: "Bitcoin", base: 35, isEq: true },
            SENS: { name: "Sensorion", base: 22.38, isEq: true, isF: true }
        };

        function initApp() {
            document.getElementById('pinInput').addEventListener('input', (e) => {
                if(e.target.value === PIN) {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('app-content').style.display = 'block';
                    fetchMarketData();
                }
            });
        }

        function fetchMarketData() {
            Object.keys(STRATEGY).forEach(k => { marketData[k] = (Math.random() * 4 - 2).toFixed(2); });
            calculateAll();
        }

        function calculateAll() {
            const input = parseFloat(document.getElementById('dcaInput').value) || 0;
            const ratio = input / 330;
            let totEq = 0, totDca = 0;

            document.getElementById('dca-list').innerHTML = Object.keys(STRATEGY).map(k => {
                const val = STRATEGY[k].isF ? STRATEGY[k].base : (STRATEGY[k].base * ratio);
                totDca += parseFloat(val);
                if(STRATEGY[k].isEq) totEq += parseFloat(val);
                const perf = parseFloat(marketData[k]);
                const isPos = perf >= 0;

                return `<div class="glass-card !mb-2 flex justify-between items-center py-4">
                    <div class="flex items-center gap-3">
                        <svg class="sparkline" style="stroke: ${isPos ? 'var(--up)' : 'var(--down)'}"><path d="${isPos ? 'M 0,15 L 10,10 L 20,18 L 30,5 L 40,12 L 50,2' : 'M 0,5 L 10,10 L 20,2 L 30,15 L 40,8 L 50,18'}" /></svg>
                        <div><span class="text-[10px] font-black text-gold uppercase">${k}</span><p class="text-[7px] text-zinc-600 font-bold uppercase">${STRATEGY[k].name}</p></div>
                    </div>
                    <div class="text-right text-lg font-black blur-target ${isGhost?'is-ghost':''} ${isPos ? 'perf-up' : 'perf-down'}">
                        ${dcaViewMode === 'amount' ? parseFloat(val).toFixed(2)+'€' : (isPos?'+':'')+marketData[k]+'%'}
                    </div>
                </div>`;
            }).join('');

            updateDisplays(input, totEq, totDca);
        }

        function updateDisplays(dca, eq, tot) {
            document.getElementById('total-val').innerText = capitalBase.toLocaleString('fr-FR') + " €";
            const pct = Math.min((capitalBase / 50000) * 100, 100);
            setTimeout(() => { document.getElementById('success-bar').style.width = pct + "%"; }, 100);
            document.getElementById('success-pct').innerText = Math.round(pct) + "%";
            document.getElementById('equityDisplay').innerText = Math.round((eq/tot)*100) + "%";
            
            const r = 0.0707;
            const fireVal = fireViewMode === 'rente' ? (capitalBase * 0.04 / 12) : (capitalBase * r / 12);
            document.getElementById('fire-val').innerText = Math.round(fireVal) + " €";
            document.getElementById('fire-label').innerText = fireViewMode === 'rente' ? "Rente Mensuelle (4%)" : "Croissance (7.07%)";

            const ml = Math.round(Math.log((50000 * r/12 + dca) / (capitalBase * r/12 + dca)) / Math.log(1 + r/12));
            document.getElementById('virement-countdown').innerText = (ml > 0 ? ml : 0) + " virements";
        }

        function toggleDcaView() { dcaViewMode = dcaViewMode === 'amount' ? 'perf' : 'amount'; calculateAll(); }
        function toggleFireView() { fireViewMode = fireViewMode === 'rente' ? 'growth' : 'rente'; calculateAll(); }
        function confirmDCA() { capitalBase += parseFloat(document.getElementById('dcaInput').value); calculateAll(); }
        function resetApp() { document.getElementById('dcaInput').value = 330; calculateAll(); }
        function toggleGhost() { isGhost = !isGhost; document.querySelectorAll('.blur-target').forEach(e => e.classList.toggle('is-ghost', isGhost)); }
        function editCapital() { const n = prompt("Capital:", capitalBase); if(n) { capitalBase = parseFloat(n); calculateAll(); } }
        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            btn.classList.add('nav-active');
        }
    </script>
</body>
</html>
