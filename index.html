<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Invest Pilot V3.18 - Ultimate Gold</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --gold: #D4AF37; --bg: #010409; }
        body { background: var(--bg); color: #e6edf3; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* FORÇAGE DU RENDU LUXE */
        .glass-card { 
            background: linear-gradient(135deg, rgba(20,25,35,0.8) 0%, rgba(5,10,20,0.9) 100%);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-btn { font-size: 10px; font-weight: 800; color: #484f58; flex: 1; text-align: center; padding: 15px 0; border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: 1px; }
        .nav-active { color: var(--gold); border-bottom-color: var(--gold); }

        /* CORRECTIF STATS : FORÇAGE DES LÉGENDES VISIBLES */
        .stat-label { font-size: 11px; font-weight: 900; color: #8b949e; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 3px; }

        .page { display: none; padding: 20px; padding-bottom: 120px; }
        .active { display: block; }
        
        input { background: transparent; border: none; outline: none; color: white; }
        .gold-text { color: var(--gold); font-weight: 900; }
    </style>
</head>
<body onload="initApp()">

    <div id="lock-screen" class="fixed inset-0 bg-[#010409] z-[5000] flex flex-col items-center justify-center">
        <img src="1773669549907.png" class="w-20 h-20 rounded-3xl mb-10 border border-gold/20 shadow-2xl">
        <input type="password" id="pinInput" maxlength="4" placeholder="PIN" class="text-center text-4xl w-40 border-b-2 border-gold pb-2">
    </div>

    <div id="app-content" style="display:none">
        <header class="p-6 pt-12 flex justify-between items-center border-b border-white/5 bg-[#010409]/90 backdrop-blur-md sticky top-0 z-50">
            <div class="flex flex-col">
                <span class="text-[10px] font-black text-gold uppercase tracking-[3px]">Pilot Terminal</span>
                <span id="current-date" class="text-[12px] opacity-50 font-bold uppercase"></span>
            </div>
            <img src="1773669549907.png" class="w-10 h-10 rounded-xl border border-gold/30">
        </header>

        <nav class="flex border-b border-white/5 sticky top-[97px] bg-[#010409] z-50">
            <button onclick="showPage('main', this)" class="nav-btn nav-active">DCA</button>
            <button onclick="showPage('fire', this)" class="nav-btn">FIRE</button>
            <button onclick="showPage('stats', this)" class="nav-btn">STATS</button>
            <button onclick="showPage('market', this)" class="nav-btn">MARCHÉ</button>
        </nav>

        <div id="main" class="page active">
            <div class="glass-card">
                <p class="text-[10px] font-black text-gold/60 uppercase mb-2 tracking-widest italic">Versement Mensuel</p>
                <div class="flex items-end gap-4 mb-8">
                    <input type="number" id="dcaInput" value="330" oninput="calculateDCA()" class="text-6xl font-black w-full tracking-tighter">
                    <button onclick="saveToHistory()" class="bg-gold text-black w-14 h-14 rounded-2xl flex items-center justify-center font-black text-2xl mb-1">✓</button>
                </div>
                <div id="calculation-list" class="space-y-3"></div>
            </div>
        </div>

        <div id="fire" class="page">
            <div class="glass-card text-center py-10">
                <p class="text-[10px] font-black text-gold/60 uppercase mb-4 tracking-[0.2em]">Rente Mensuelle (Objectif 1500€)</p>
                <div class="text-7xl font-black text-white mb-10" id="rente-val">0 €</div>
                <div class="space-y-6 text-left">
                    <div id="step-1" class="flex justify-between items-center stat-label"><span>☕ Abonnements (50€)</span><span id="rem-50" class="text-gold">50€</span></div>
                    <div id="step-2" class="flex justify-between items-center stat-label"><span>🛒 Courses (250€)</span><span id="rem-250" class="text-gold">250€</span></div>
                    <div id="step-3" class="flex justify-between items-center stat-label"><span>🏠 Loyer (800€)</span><span id="rem-800" class="text-gold">800€</span></div>
                    <div class="h-1 bg-white/5 rounded-full mt-4"><div id="fire-progress" class="h-full bg-gold transition-all duration-1000 w-0"></div></div>
                </div>
            </div>
        </div>

        <div id="stats" class="page">
            <div class="glass-card">
                <p class="text-center text-[10px] font-black text-gold uppercase mb-6 tracking-widest italic">Allocation d'Actifs</p>
                <div class="h-48 mb-8"><canvas id="allocChart"></canvas></div>
                <div class="grid grid-cols-3 gap-4 border-t border-white/5 pt-6">
                    <div class="stat-label"><div class="dot bg-[#D4AF37]"></div>PEA</div>
                    <div class="stat-label"><div class="dot bg-[#10b981]"></div>CRYPTO</div>
                    <div class="stat-label"><div class="dot bg-[#f59e0b]"></div>CTO</div>
                </div>
                <div class="grid grid-cols-3 gap-4 mt-2">
                    <div class="text-center text-[12px] font-bold">85%</div>
                    <div class="text-center text-[12px] font-bold">11%</div>
                    <div class="text-center text-[12px] font-bold">4%</div>
                </div>
            </div>

            <div class="glass-card">
                <p class="text-center text-[10px] font-black text-gold uppercase mb-6 tracking-widest italic">Exposition Géographique</p>
                <div class="h-48 mb-8"><canvas id="geoChart"></canvas></div>
                <div class="grid grid-cols-3 gap-4 border-t border-white/5 pt-6">
                    <div class="stat-label"><div class="dot bg-[#ef4444]"></div>USA</div>
                    <div class="stat-label"><div class="dot bg-[#D4AF37]"></div>EUROPE</div>
                    <div class="stat-label"><div class="dot bg-[#6366f1]"></div>EM</div>
                </div>
                <div class="grid grid-cols-3 gap-4 mt-2">
                    <div class="text-center text-[12px] font-bold">70%</div>
                    <div class="text-center text-[12px] font-bold">20%</div>
                    <div class="text-center text-[12px] font-bold">10%</div>
                </div>
            </div>
        </div>

        <div id="market" class="page">
            <div class="glass-card h-[500px] p-0 overflow-hidden border-gold/30">
                <iframe src="https://s.tradingview.com/embed-widget/market-overview/?locale=fr#%7B%22colorTheme%22%3A%22dark%22%2C%22isTransparent%22%3Atrue%2C%22width%22%3A%22100%25%22%2C%22height%22%3A%22100%25%22%2C%22tabs%22%3A%5B%7B%22title%22%3A%22Indices%22%2C%22symbols%22%3A%5B%7B%22s%22%3A%22FOREXCOM%3ASPX500%22%2C%22d%22%3A%22S%26P%20500%22%7D%2C%7B%22s%22%3A%22INDEX%3ACAC40%22%2C%22d%22%3A%22CAC%2040%22%7D%2C%7B%22s%22%3A%22BINANCE%3ABTCUSDT%22%2C%22d%22%3A%22Bitcoin%22%7D%5D%7D%5D%7D" width="100%" height="100%" frameborder="0"></iframe>
            </div>
        </div>
    </div>

    <script>
        const baseData = { world: 192, cofa: 30, immo: 27, em: 22, def: 12, sp: 12, crypto: 35 };
        let charts = {};

        function initApp() {
            document.getElementById('pinInput').addEventListener('input', (e) => {
                if(e.target.value === "1104") {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('app-content').style.display = 'block';
                    updateAll();
                }
            });
            calculateDCA();
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
        }

        function calculateDCA() {
            const val = parseFloat(document.getElementById('dcaInput').value) || 0;
            const container = document.getElementById('calculation-list');
            let res = {...baseData};
            if (val > 330) { const s = val - 330; res.world += s * 0.8; res.crypto += s * 0.2; }
            else { const r = val / 330; Object.keys(baseData).forEach(k => res[k] *= r); }
            container.innerHTML = Object.keys(res).map(k => `
                <div class="flex justify-between items-center p-4 bg-white/5 rounded-xl border border-white/5">
                    <span class="text-[10px] font-black text-gold uppercase opacity-60">${k}</span>
                    <span class="text-xl font-black">${res[k].toFixed(2)}€</span>
                </div>`).join('');
        }

        function updateAll() {
            const history = JSON.parse(localStorage.getItem('invest_history') || '[]');
            const total = history.reduce((sum, item) => sum + item.amount, 0);
            const rente = (total * 0.04) / 12;
            document.getElementById('rente-val').innerText = rente.toFixed(2) + " €";
            
            const steps = [50, 250, 800];
            steps.forEach((s, i) => {
                const el = document.getElementById('step-' + (i+1));
                const rem = document.getElementById('rem-' + s);
                if(rente >= s) { el.style.opacity = "1"; el.style.color = "#10b981"; rem.innerText = "OK"; }
                else { el.style.opacity = "0.4"; rem.innerText = (s - rente).toFixed(0) + "€"; }
            });

            document.getElementById('fire-progress').style.width = Math.min((rente/1500)*100, 100) + "%";
            renderCharts();
        }

        function renderCharts() {
            const cfgs = [
                { id: 'allocChart', data: [85, 11, 4], colors: ['#D4AF37', '#10b981', '#f59e0b'] },
                { id: 'geoChart', data: [70, 20, 10], colors: ['#ef4444', '#D4AF37', '#6366f1'] }
            ];
            cfgs.forEach(cfg => {
                const ctx = document.getElementById(cfg.id);
                if(charts[cfg.id]) charts[cfg.id].destroy();
                charts[cfg.id] = new Chart(ctx, {
                    type: 'doughnut',
                    data: { datasets: [{ data: cfg.data, backgroundColor: cfg.colors, borderWidth: 0 }] },
                    options: { cutout: '85%', maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
            });
        }

        function saveToHistory() {
            const val = parseFloat(document.getElementById('dcaInput').value);
            if(!val) return;
            const history = JSON.parse(localStorage.getItem('invest_history') || '[]');
            history.push({ date: new Date().toLocaleDateString('fr-FR', { month: 'short' }), amount: val });
            localStorage.setItem('invest_history', JSON.stringify(history));
            updateAll();
            alert("Versement enregistré !");
        }

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            btn.classList.add('nav-active');
            if(id === 'stats') setTimeout(renderCharts, 100);
        }
    </script>
</body>
</html>
