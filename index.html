<div id="market" class="page">
    <div class="flex justify-between items-center mb-6">
        <p class="text-[10px] font-black text-gold uppercase tracking-[4px] italic">Moniteur d'Actifs</p>
        <button onclick="toggleWatchlist()" class="bg-gold/10 border border-gold/30 text-gold w-10 h-10 rounded-full flex items-center justify-center font-black text-xl active:scale-90 transition-transform">+</button>
    </div>

    <div id="watchlist" class="hidden glass-card p-2 mb-6 border-gold/40 animate-pulse-subtle">
        <p class="text-[9px] text-center font-bold text-slate-500 uppercase mb-4">Favoris de Stratégie</p>
        <div class="space-y-2 max-h-60 overflow-y-auto pr-2">
            <div class="flex justify-between p-3 bg-white/5 rounded-lg border border-white/5 text-[10px] font-bold"><span>MSCI WORLD (CW8)</span><span class="text-emerald-500">PAAS:CW8</span></div>
            <div class="flex justify-between p-3 bg-white/5 rounded-lg border border-white/5 text-[10px] font-bold"><span>S&P 500 (ESE)</span><span class="text-emerald-500">EURONEXT:ESE</span></div>
            <div class="flex justify-between p-3 bg-white/5 rounded-lg border border-white/5 text-[10px] font-bold"><span>BITCOIN (BTC)</span><span class="text-orange-500">BINANCE:BTCUSDT</span></div>
        </div>
    </div>

    <div class="glass-card h-[450px] p-0 overflow-hidden border-gold/20">
        <div id="tv-advanced-chart" style="height:100%;width:100%;"></div>
    </div>

    <div class="glass-card mt-4 p-4">
        <p class="text-[9px] font-black text-slate-500 uppercase mb-3">Flash Éco</p>
        <div class="h-40 overflow-hidden opacity-70">
            <iframe src="https://www.widgets.investing.com/top-financial-news?theme=darkTheme&roundedCorners=true" width="100%" height="100%" frameborder="0"></iframe>
        </div>
    </div>
</div>

<script>
    // AJOUTER CES FONCTIONS DANS TA BALISE <SCRIPT>

    function toggleWatchlist() {
        const wl = document.getElementById('watchlist');
        wl.classList.toggle('hidden');
    }

    // Initialisation du graphique avancé TradingView
    function initTradingView() {
        new TradingView.widget({
            "autosize": true,
            "symbol": "EURONEXT:CW8", // MSCI World par défaut
            "interval": "D",
            "timezone": "Europe/Paris",
            "theme": "dark",
            "style": "3", // Zone (plus luxueux)
            "locale": "fr",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_top_toolbar": false,
            "hide_legend": false,
            "save_image": false,
            "container_id": "tv-advanced-chart",
            "backgroundColor": "rgba(1, 4, 9, 1)",
            "gridColor": "rgba(212, 175, 55, 0.05)",
            "withdateranges": true,
            "details": true,
            "hotlist": false,
            "calendar": false,
            "show_popup_button": true,
            "popup_width": "1000",
            "popup_height": "650",
            "allow_symbol_change": true // Permet de chercher tes ETF via le bouton +
        });
    }

    // Modifier la fonction showPage existante pour charger TradingView
    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        btn.classList.add('nav-active');
        
        if(id === 'stats' || id === 'fire') setTimeout(updateAll, 100);
        
        // Charger TradingView seulement quand on arrive sur l'onglet Marché
        if(id === 'market') {
            const script = document.createElement('script');
            script.src = "https://s3.tradingview.com/tv.js";
            script.onload = initTradingView;
            document.head.appendChild(script);
        }
    }
</script>
