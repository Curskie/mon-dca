<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Invest Pilot V4.3</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Invest Pilot">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#010409">
    <link rel="apple-touch-icon" href="1773669549907.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <style>
        :root { --gold: #D4AF37; --bg: #010409; }
        body { 
            background: var(--bg); 
            color: #e6edf3; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding-top: env(safe-area-inset-top); 
            overflow-x: hidden; 
        }
        
        .glass-card { 
            background: linear-gradient(135deg, rgba(20,25,35,0.8) 0%, rgba(5,10,20,0.9) 100%);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 24px; padding: 24px; margin-bottom: 20px;
        }

        #sidebar { position: fixed; left: -320px; top: 0; width: 300px; height: 100%; background: #05070a; z-index: 3000; transition: 0.4s; padding: 60px 20px; border-right: 1px solid rgba(212,175,55,0.1); overflow-y: auto; }
        #sidebar.open { left: 0; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2500; display: none; backdrop-filter: blur(8px); }

        .nav-btn { font-size: 9px; font-weight: 800; color: #484f58; flex: 1; text-align: center; padding: 18px 0; border-bottom: 2px solid transparent; text-transform: uppercase; }
        .nav-active { color: var(--gold); border-bottom-color: var(--gold); }

        .page { display: none; padding: 20px; padding-bottom: 120px; }
        .active { display: block; }
        
        .stat-label { font-size: 9px; font-weight: 900; color: #8b949e; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .dot { width: 7px; height: 7px; border-radius: 2px; }

        .grade-card { opacity: 0.2; filter: grayscale(1); transition: 0.3s; text-align: center; }
        .grade-active { opacity: 1; filter: grayscale(0); transform: scale(1.1); }
    </style>
</head>
<body onload="initApp()">

    <div id="overlay" onclick="toggleSidebar()"></div>
    
    <div id="sidebar">
        <div class="mb-8 text-center">
            <p class="text-[10px] font-black text-gold uppercase tracking-[3px] mb-4">Progression</p>
            <div class="bg-white/5 rounded-2xl p-4 border border-white/5">
                <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Série DCA</p>
                <p class="text-3xl font-black text-white"><span id="streak-val">0</span> <small class="text-xs text-gold">MOIS</small></p>
            </div>
        </div>

        <p class="text-[10px] font-black text-gold uppercase tracking-[3px] mb-4 text-center">Le Coffre</p>
        <textarea id="vault-input" oninput="saveVault()" class="w-full h-32 bg-white/5 border border-white/10 rounded-xl p-4 text-xs text-slate-300 outline-none mb-6" placeholder="Notes confidentielles..."></textarea>
        
        <button onclick="exportData()" class="w-full p-4 bg-white/5 rounded-xl text-[10px] font-black uppercase text-slate-400 border border-white/5 mb-2">💾 Export JSON</button>
        <button onclick="hardReset()" class="w-full p-4 bg-red-900/10 rounded-xl text-[10px] font-black uppercase text-red-500/70 border border-red-900/20">⚠️ Réinitialiser</button>
    </div>

    <div id="lock-screen" class="fixed inset-0 bg-[#010409] z-[5000] flex flex-col items-center justify-center">
        <img src="1773669549907.png" class="w-20 h-20 rounded-3xl mb-10 border border-gold/20 p-1">
        <input type="password" id="pinInput" maxlength="4" placeholder="••••" class="bg-transparent text-center text-5xl w-40 border-b-2 border-gold pb-2 text-gold outline-none">
    </div>

    <div id="app-content" style="display:none">
        <header class="p-6 pt-12 flex justify-between items-center border-b border-white/5 bg-[#010409]/90 sticky top-0 z-50">
            <button onclick="toggleSidebar()" class="text-gold p-2"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 8h16M4 16h16" stroke-linecap="round"/></svg></button>
            <span id="current-date" class="text-[11px] font-black text-gold uppercase tracking-widest text-center">Invest Pilot</span>
            <img src="1773669549907.png" class="w-10 h-10 rounded-xl border border-gold/30">
        </header>

        <nav class="flex border-b border-white/5 sticky top-[95px] bg-[#010409] z-50">
            <button onclick="showPage('main', this)" class="nav-btn nav-active">DCA</button>
            <button onclick="showPage('fire', this)" class="nav-btn">FIRE</button>
            <button onclick="showPage('stats', this)" class="nav-btn">STATS</button>
            <button onclick="showPage('market', this)" class="nav-btn">MARCHÉ</button>
        </nav>

        <div id="main" class="page active">
            <div class="glass-card mb-6">
                <p class="text-[10px] font-black text-gold uppercase tracking-widest mb-6 text-center italic">Grades d'investisseur</p>
                <div class="grid grid-cols-3 gap-6">
                    <div id="g-1" class="grade-card"><img src="https://cdn-icons-png.flaticon.com/512/6213/6213125.png" class="w-10 mx-auto mb-1"><p class="text-[8px] font-black">CUIVRE</p></div>
                    <div id="g-3" class="grade-card"><img src="https://cdn-icons-png.flaticon.com/512/2583/2583344.png" class="w-10 mx-auto mb-1"><p class="text-[8px] font-black">BRONZE</p></div>
                    <div id="g-6" class="grade-card"><img src="https://cdn-icons-png.flaticon.com/512/2583/2583319.png" class="w-10 mx-auto mb-1"><p class="text-[8px] font-black">ARGENT</p></div>
                </div>
            </div>

            <div class="glass-card">
                <div class="flex items-end gap-4 mb-8">
                    <input type="number" id="dcaInput" value="330" oninput="calculateDCA()" class="text-6xl font-black w-full tracking-tighter bg-transparent outline-none">
                    <button onclick="saveToHistory()" class="bg-gold w-16 h-16 rounded-2xl flex items-center justify-center mb-1"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4"><path d="M5 13l4 4L19 7" stroke-linecap="round"/></svg></button>
                </div>
                <div id="calculation-list" class="space-y-3"></div>
            </div>
        </div>

        <div id="fire" class="page">
            <div class="glass-card text-center">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest">Projection Patrimoine</p>
                <div class="text-5xl font-black text-white mb-10" id="rente-val">0 €</div>
                <div id="forecast-list" class="space-y-4 text-left border-t border-white/5 pt-6"></div>
            </div>
        </div>

        <div id="stats" class="page">
            <div class="glass-card">
                <p class="text-center text-[10px] font-black text-gold uppercase mb-6 tracking-widest italic">Actifs</p>
                <div class="h-44 mb-6"><canvas id="allocChart"></canvas></div>
                <div class="grid grid-cols-3 gap-2 border-t border-white/5 pt-4">
                    <div class="stat-label"><div class="dot bg-[#D4AF37]"></div>PEA</div>
                    <div class="stat-label"><div class="dot bg-[#10b981]"></div>CRYPTO</div>
                    <div class="stat-label"><div class="dot bg-[#f59e0b]"></div>CTO</div>
                </div>
            </div>
            <div class="glass-card">
                <p class="text-center text-[10px] font-black text-gold uppercase mb-6 tracking-widest italic">Géographie</p>
                <div class="h-44 mb-6"><canvas id="geoChart"></canvas></div>
                <div class="grid grid-cols-3 gap-2 border-t border-white/5 pt-4">
                    <div class="stat-label"><div class="dot bg-[#ef4444]"></div>USA</div>
                    <div class="stat-label"><div class="dot bg-[#D4AF37]"></div>EURO</div>
                    <div class="stat-label"><div class="dot bg-[#6366f1]"></div>EM</div>
                </div>
            </div>
        </div>

        <div id="market" class="page">
            <div id="tv_container" class="glass-card h-[500px] p-0 overflow-hidden border-gold/20"></div>
        </div>
    </div>

    <script>
        const PIN_SECRET = "1104"; // MODIFIE TON CODE ICI
        const baseData = { world: 192, cofa: 30, immo: 27, em: 22, def: 12, sp: 12, crypto: 35 };
        let charts = {};

        function initApp() {
            document.getElementById('pinInput').addEventListener('input', (e) => {
                if(e.target.value === PIN_SECRET) {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('app-content').style.display = 'block';
                    document.getElementById('vault-input').value = localStorage.getItem('invest_vault') || '';
                    updateAll();
                }
            });
            calculateDCA();
        }

        function toggleSidebar() { 
            const s = document.getElementById('sidebar');
            const o = document.getElementById('overlay');
            s.classList.toggle('open');
            o.style.display = s.classList.contains('open') ? 'block' : 'none';
        }

        function calculateDCA() {
            const val = parseFloat(document.getElementById('dcaInput').value) || 0;
            const container = document.getElementById('calculation-list');
            let res = {...baseData};
            if (val > 330) { const s = val - 330; res.world += s * 0.8; res.crypto += s * 0.2; }
            else { const r = val / 330; Object.keys(baseData).forEach(k => res[k] *= r); }
            container.innerHTML = Object.keys(res).map(k => `
                <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl border border-white/5">
                    <span class="text-[9px] font-black text-gold uppercase opacity-60">${k}</span>
                    <span class="text-lg font-black text-white">${res[k].toFixed(2)}€</span>
                </div>`).join('');
        }

        function updateAll() {
            const history = JSON.parse(localStorage.getItem('invest_history') || '[]');
            const total = history.reduce((sum, item) => sum + item.amount, 0);
            const rente = (total * 0.04) / 12;
            const streak = history.length;
            
            document.getElementById('rente-val').innerText = rente.toFixed(2) + " €";
            document.getElementById('streak-val').innerText = streak;

            document.querySelectorAll('.grade-card').forEach(c => c.classList.remove('grade-active'));
            if(streak >= 1) document.getElementById('g-1').classList.add('grade-active');
            if(streak >= 3) document.getElementById('g-3').classList.add('grade-active');
            if(streak >= 6) document.getElementById('g-6').classList.add('grade-active');

            const dca = parseFloat(document.getElementById('dcaInput').value) || 330;
            document.getElementById('forecast-list').innerHTML = [10, 20, 30].map(y => {
                let cap = total;
                for(let i=0; i<y*12; i++) cap = (cap + dca) * (1 + 0.07/12);
                return `<div class="border-l-2 border-gold pl-4 py-1">
                    <p class="text-[8px] text-gold font-black uppercase">Horizon ${y} ans</p>
                    <p class="text-xl font-black">${cap.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0})}</p>
                </div>`;
            }).join('');
            renderCharts();
        }

        function renderCharts() {
            const setup = (id, data, colors) => {
                if(charts[id]) charts[id].destroy();
                charts[id] = new Chart(document.getElementById(id), {
                    type: 'doughnut',
                    data: { datasets: [{ data, backgroundColor: colors, borderWidth: 0 }] },
                    options: { cutout: '82%', maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
            };
            setup('allocChart', [85, 11, 4], ['#D4AF37', '#10b981', '#f59e0b']);
            setup('geoChart', [70, 20, 10], ['#ef4444', '#D4AF37', '#6366f1']);
        }

        function saveToHistory() {
            const val = parseFloat(document.getElementById('dcaInput').value);
            if(!val) return;
            const history = JSON.parse(localStorage.getItem('invest_history') || '[]');
            history.push({ amount: val });
            localStorage.setItem('invest_history', JSON.stringify(history));
            updateAll();
            alert("Injection enregistrée !");
        }

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            btn.classList.add('nav-active');
            if(id === 'market') {
                new TradingView.widget({
                    "autosize": true, "symbol": "EURONEXT:CW8", "interval": "D", "timezone": "Europe/Paris",
                    "theme": "dark", "style": "3", "locale": "fr", "container_id": "tv_container",
                    "backgroundColor": "#010409", "gridColor": "rgba(212, 175, 55, 0.05)",
                    "hide_top_toolbar": false, "allow_symbol_change": true, "save_image": false
                });
            }
            if(id === 'stats' || id === 'fire' || id === 'main') setTimeout(updateAll, 50);
        }

        function saveVault() { localStorage.setItem('invest_vault', document.getElementById('vault-input').value); }
        function exportData() { navigator.clipboard.writeText(localStorage.getItem('invest_history')); alert("Copié !"); }
        function hardReset() { if(confirm("Voulez-vous tout réinitialiser ?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
